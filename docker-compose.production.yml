version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vexus_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vexus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vexus_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vexus_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vexus_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vexus_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vexus_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: vexus_backend_prod
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vexus_network
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: vexus_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf.prod:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - vexus_network
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: vexus_certbot_prod
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - vexus_network
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    container_name: vexus_backup_prod
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - ./backups:/backups
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vexus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vexus_db}
    entrypoint: |
      /bin/sh -c "
      apk add --no-cache dcron curl
      echo '0 3 * * * /bin/sh /backup.sh >> /backups/backup.log 2>&1' > /etc/crontabs/root
      mkdir -p /backups
      chmod 700 /etc/crontabs/root
      crond -f -l 2
      "
    depends_on:
      - postgres
    networks:
      - vexus_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vexus_network:
    driver: bridge
