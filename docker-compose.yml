version: '3.8'

services:
  # PostgreSQL nativo do host (porta 5432 já em uso pelo systemd)
  # Não sobe container - usa o PostgreSQL instalado diretamente na VPS

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vexus-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    network_mode: host

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: vexus-backend
    environment:
      DATABASE_URL: postgresql://vexus:vexus_password_123@localhost:5432/vexus_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ${SECRET_KEY:-vexus-secret-key-change-in-production}
      CORS_ORIGINS: "http://localhost:3000,http://localhost:9000,http://localhost:8081,http://localhost:8080"
      ENV: ${ENV:-development}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8000"   # host port changed to 8080 to avoid conflicts
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    network_mode: host
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: vexus-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"   # frontend served on host port 8081 to avoid collisions
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    network_mode: host

  # Evolution API - WhatsApp Gateway
  # Acesso: http://localhost:3000
  # API Key: vexus_evolution_key_change_me
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: vexus-evolution-api
    environment:
      # Variáveis para o script de migração (DOCKER_ENV=true ignora .env nos shell scripts)
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://vexus:vexus_password_123@localhost:5432/vexus_crm?schema=vexus"
      DATABASE_URL: "postgresql://vexus:vexus_password_123@localhost:5432/vexus_crm?schema=vexus"
      # Variáveis da aplicação
      SERVER_PORT: "3000"
      SERVER_URL: "http://localhost:3000"
      AUTHENTICATION_API_KEY: "vexus_evolution_key_change_me"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DATABASE_CONNECTION_CLIENT_NAME: vexus_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://localhost:6379/6"
      CACHE_REDIS_PREFIX_KEY: evolution
      WEBHOOK_GLOBAL_ENABLED: "false"
      LOG_LEVEL: ERROR,WARN,INFO
    volumes:
      - ./evolution.env:/evolution/.env:ro
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    network_mode: host
    restart: unless-stopped

volumes:
  redis_data:
  evolution_instances:
  evolution_store:

