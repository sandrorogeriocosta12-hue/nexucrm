<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Modal</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-btn { background: #8b5cf6; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Teste do Modal de Termos</h1>
    <button class="test-btn" onclick="openTermsModal()">Abrir Termos de Serviço</button>

    <!-- Terms Modal -->
    <div id="termsModal" style="position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; background-color: rgba(0, 0, 0, 0.8) !important; z-index: 10000 !important; display: none !important; align-items: center !important; justify-content: center !important; min-height: 100vh !important; padding: 1rem !important; visibility: hidden !important; opacity: 0 !important;">
        <div style="background-color: rgb(30, 41, 59) !important; border-radius: 0.5rem !important; max-width: 56rem !important; width: 100% !important; max-height: 90vh !important; overflow: hidden !important; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;">
            <div style="padding: 1.5rem !important; border-bottom: 1px solid rgb(51, 65, 85) !important;">
                <div style="display: flex !important; align-items: center !important; justify-content: space-between !important;">
                    <h3 style="font-size: 1.25rem !important; line-height: 1.75rem !important; font-weight: 700 !important; color: rgb(196, 181, 253) !important; margin: 0 !important;">Termos de Serviço</h3>
                    <button onclick="closeTermsModal()" style="color: rgb(156, 163, 175) !important; font-size: 1.5rem !important; line-height: 2rem !important; background: none !important; border: none !important; cursor: pointer !important; padding: 0 !important;">&times;</button>
                </div>
            </div>
            <div style="padding: 1.5rem !important; overflow-y: auto !important; max-height: 70vh !important;">
                <div class="terms-content" style="color: rgb(209, 213, 219) !important;">
                    <h4 style="color: rgb(196, 181, 253) !important; font-weight: 600 !important; margin-bottom: 1rem !important;">1. Aceitação dos Termos</h4>
                    <p style="margin-bottom: 1rem !important;">Este é um teste do modal de termos.</p>
                </div>
            </div>
            <div style="padding: 1.5rem !important; border-top: 1px solid rgb(51, 65, 85) !important; display: flex !important; justify-content: flex-end !important; gap: 1rem !important;">
                <button onclick="closeTermsModal()" style="background: rgba(71, 85, 105, 0.5) !important; color: rgb(209, 213, 219) !important; padding: 12px 24px !important; border-radius: 8px !important; border: none !important; cursor: pointer !important;">Fechar</button>
                <button onclick="acceptTerms()" style="background: linear-gradient(135deg, #a855f7, #ec4899) !important; color: white !important; padding: 12px 24px !important; border-radius: 8px !important; border: none !important; cursor: pointer !important; font-weight: 600 !important;">Aceito os Termos</button>
            </div>
        </div>
    </div>

    <script>
        function openTermsModal() {
            console.log('Opening terms modal - function called');
            const modal = document.getElementById('termsModal');
            console.log('Modal element:', modal);
            if (modal) {
                modal.style.display = 'flex';
                console.log('Modal display set to flex');
                console.log('Modal computed style display:', window.getComputedStyle(modal).display);
                // Force visibility
                modal.style.visibility = 'visible';
                modal.style.opacity = '1';
            } else {
                console.error('Modal element not found!');
            }
        }

        function closeTermsModal() {
            const modal = document.getElementById('termsModal');
            if (modal) {
                modal.style.display = 'none';
                modal.style.visibility = 'hidden';
                modal.style.opacity = '0';
            }
        }

        function acceptTerms() {
            alert('Termos aceitos!');
            closeTermsModal();
        }
    </script>
</body>
</html>
