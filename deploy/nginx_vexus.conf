# Nginx site config for api.nexuscrm.tech
# Place in /etc/nginx/sites-available/vexus and symlink to /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.nexuscrm.tech;

    # Redirect HTTP to HTTPS (if using certbot later)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Serve frontend static app
        root /var/www/vexus/frontend; # Adjust to your frontend build output
        try_files $uri $uri/ /frontend/app.html;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://127.0.0.1:8001/; # FastAPI backend
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        client_max_body_size 50M;
    }

    location /api/v1/ {
        proxy_pass http://127.0.0.1:8001/; # backend
        proxy_set_header Host $host;
    }

    # Optional: handle websocket upgrade for realtime
    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://127.0.0.1:8001;
    }
}
