name: CI Pipeline

on:
push:
branches: [ main, develop ]
pull_request:
branches: [ main ]

jobs:
test:
runs-on: ubuntu-latest
strategy:
matrix:
python-version: ["3.11", "3.12"]

services:
postgres:
image: postgres:15
env:
POSTGRES_PASSWORD: postgres
POSTGRES_DB: vexus_test
options: >-
--health-cmd pg_isready
--health-interval 10s
--health-timeout 5s
--health-retries 5
ports:
- 5432:5432

redis:
image: redis:7-alpine
options: >-
--health-cmd "redis-cli ping"
--health-interval 10s
--health-timeout 5s
--health-retries 5
ports:
- 6379:6379

steps:
- uses: actions/checkout@v4

- name: Set up Python ${{ matrix.python-version }}
uses: actions/setup-python@v4
with:
python-version: ${{ matrix.python-version }}

- name: Install dependencies
run: |
python -m pip install --upgrade pip
pip install -e ".[dev]"

- name: Compile fuzzy C library
run: |
cd c_modules/fuzzy && make || echo "make failed; continuing" # nonfatal
cd -

- name: Lint with flake8
run: |
flake8 app/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
flake8 app/ tests/ --count --exit-zero --max-complexity=10 --statistics

- name: Check formatting with black
run: |
black --check app/ tests/

- name: Check imports with isort
run: |
isort --check-only app/ tests/

- name: Type checking with mypy
run: |
mypy app/ --config-file pyproject.toml

- name: Run tests with pytest
env:
DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vexus_test
REDIS_URL: redis://localhost:6379/0
SECRET_KEY: test-secret-key-for-ci-${{ github.run_id }}
ENVIRONMENT: test
run: |
pytest tests/ \
--cov=app \
--cov-report=xml \
--cov-report=html \
--cov-report=term-missing \
-v \
--tb=short

- name: Upload coverage to Codecov
uses: codecov/codecov-action@v3
with:
file: ./coverage.xml
fail_ci_if_error: true

- name: Upload test results
uses: actions/upload-artifact@v3
if: always()
with:
name: test-results-${{ matrix.python-version }}
path: |
htmlcov/
coverage.xml

security:
runs-on: ubuntu-latest
needs: test

steps:
- uses: actions/checkout@v4

- name: Set up Python
uses: actions/setup-python@v4
with:
python-version: "3.11"

- name: Run security scan
run: |
pip install bandit safety
bandit -r app/ -f html -o security-report.html
safety check --full-report

- name: Upload security report
uses: actions/upload-artifact@v3
if: always()
with:
name: security-report
path: security-report.html

docker-build:
runs-on: ubuntu-latest
needs: [test, security]
if: github.event_name == 'push' && github.ref == 'refs/heads/main'

steps:
- uses: actions/checkout@v4

- name: Set up Docker Buildx
uses: docker/setup-buildx-action@v2

- name: Login to DockerHub
uses: docker/login-action@v2
with:
username: ${{ secrets.DOCKER_USERNAME }}
password: ${{ secrets.DOCKER_PASSWORD }}

- name: Build and push Docker image
uses: docker/build-push-action@v4
with:
context: .
file: ./Dockerfile
push: true
tags: |
${{ secrets.DOCKER_USERNAME }}/vexus-service:latest
${{ secrets.DOCKER_USERNAME }}/vexus-service:${{ github.sha }}
cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/vexus-service:buildcache
cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/vexus-service:buildcache,mode=max