name: Deploy to Production (Locaweb)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────
      # 1. Checkout do código (necessário para artefatos)
      # ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────
      # 2. Configurar SSH
      # ─────────────────────────────────────────────────────────
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # ─────────────────────────────────────────────────────────
      # 3. Clone ou atualizar repositório no servidor
      # ─────────────────────────────────────────────────────────
      - name: Atualizar código no servidor
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << 'ENDSSH'
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            REPO_URL="git@github.com:sandrorogeriocosta12-hue/nexucrm.git"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Primeiro deploy: clonando repositório..."
              mkdir -p "$(dirname $DEPLOY_PATH)"
              git clone "$REPO_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch origin
            git reset --hard origin/main
            echo "Código atualizado: $(git log -1 --oneline)"
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 4. Criar arquivos de configuração a partir dos Secrets
      # ─────────────────────────────────────────────────────────
      - name: Criar .env de produção
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << 'ENDSSH'
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            # Arquivo .env principal (FastAPI backend)
            cat > .env << 'EOF'
          ${{ secrets.PRODUCTION_ENV }}
          EOF

            # Arquivo evolution.env (Evolution API - WhatsApp gateway)
            cat > evolution.env << 'EOF'
          ${{ secrets.EVOLUTION_ENV }}
          EOF

            chmod 600 .env evolution.env
            echo ".env e evolution.env criados com sucesso"
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 5. Subir os containers (sem Evolution API primeiro)
      # ─────────────────────────────────────────────────────────
      - name: Subir postgres, redis e backend
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << 'ENDSSH'
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            # Parar e reconstruir backend, manter dados persistentes
            docker compose pull postgres redis 2>/dev/null || true
            docker compose up -d --build postgres redis backend frontend
            echo "Aguardando postgres ficar saudável..."
            for i in $(seq 1 30); do
              if docker compose exec -T postgres pg_isready -U vexus > /dev/null 2>&1; then
                echo "PostgreSQL pronto."
                break
              fi
              echo "  tentativa $i/30..."
              sleep 3
            done
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 6. Garantir schema e usuário do banco estão corretos
      # ─────────────────────────────────────────────────────────
      - name: Inicializar banco de dados
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << 'ENDSSH'
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            docker compose exec -T postgres psql -U vexus -d vexus_db -c "
              CREATE SCHEMA IF NOT EXISTS vexus;
              GRANT ALL ON SCHEMA vexus TO vexus;
              GRANT ALL ON ALL TABLES IN SCHEMA vexus TO vexus;
              ALTER DEFAULT PRIVILEGES IN SCHEMA vexus GRANT ALL ON TABLES TO vexus;
            " 2>/dev/null || true

            # Criar banco vexus_crm se não existir (usado pela Evolution API)
            docker compose exec -T postgres psql -U vexus -c \
              "SELECT 1 FROM pg_database WHERE datname='vexus_crm'" | grep -q 1 || \
              docker compose exec -T postgres psql -U vexus -c "CREATE DATABASE vexus_crm;" || true

            docker compose exec -T postgres psql -U vexus -d vexus_crm -c "
              CREATE SCHEMA IF NOT EXISTS vexus;
              GRANT ALL ON SCHEMA vexus TO vexus;
              GRANT ALL ON ALL TABLES IN SCHEMA vexus TO vexus;
              ALTER DEFAULT PRIVILEGES IN SCHEMA vexus GRANT ALL ON TABLES TO vexus;
            " 2>/dev/null || true

            echo "Banco inicializado."
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 7. Subir Evolution API (WhatsApp)
      # ─────────────────────────────────────────────────────────
      - name: Subir Evolution API
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << 'ENDSSH'
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            # Parar container antigo sem apagar dados
            docker compose stop evolution-api 2>/dev/null || true
            docker compose rm -f evolution-api 2>/dev/null || true

            # Subir novamente
            docker compose up -d evolution-api

            echo "Aguardando Evolution API inicializar (Prisma migrations)..."
            for i in $(seq 1 40); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "apikey: $(grep AUTHENTICATION_API_KEY evolution.env | cut -d= -f2)" \
                http://localhost:3000/ 2>/dev/null || echo "0")
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
                echo "Evolution API pronta (HTTP $STATUS)."
                break
              fi
              echo "  tentativa $i/40 (HTTP $STATUS)..."
              sleep 5
            done
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 8. Corrigir estado das migrations Prisma se necessário
      # ─────────────────────────────────────────────────────────
      - name: Verificar migrations Prisma
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << 'ENDSSH'
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            # Limpar migrations com erro que bloqueiam restart
            docker compose exec -T postgres psql -U vexus -d vexus_crm -c "
              DELETE FROM vexus._prisma_migrations
              WHERE finished_at IS NULL
                AND rolled_back_at IS NULL
                AND started_at < NOW() - INTERVAL '5 minutes';
            " 2>/dev/null && echo "Migrations pendentes limpas." || echo "Tabela _prisma_migrations ainda não existe (ok)."
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 9. Limpeza de imagens antigas
      # ─────────────────────────────────────────────────────────
      - name: Limpar imagens Docker antigas
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << 'ENDSSH'
            docker image prune -f --filter "until=48h" 2>/dev/null || true
            docker container prune -f 2>/dev/null || true
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 10. Health checks finais
      # ─────────────────────────────────────────────────────────
      - name: Health checks
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << 'ENDSSH'
            set -e
            echo "=== Status dos containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== Health check: Backend (FastAPI) ==="
            BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo "0")
            if [ "$BACKEND_STATUS" = "200" ]; then
              echo "✅ Backend OK (HTTP 200)"
            else
              echo "⚠️  Backend retornou HTTP $BACKEND_STATUS"
            fi

            echo ""
            echo "=== Health check: Evolution API ==="
            EVOLUTION_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "0")
            if [ "$EVOLUTION_STATUS" = "200" ] || [ "$EVOLUTION_STATUS" = "401" ]; then
              echo "✅ Evolution API OK (HTTP $EVOLUTION_STATUS)"
            else
              echo "⚠️  Evolution API retornou HTTP $EVOLUTION_STATUS"
            fi
          ENDSSH

      - name: Health check externo
        run: |
          DOMAIN="${{ secrets.PRODUCTION_DOMAIN }}"
          if [ -n "$DOMAIN" ]; then
            echo "Checando $DOMAIN/health ..."
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$DOMAIN/health" || echo "0")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Produção online: https://$DOMAIN"
            else
              echo "⚠️  Domínio externo retornou HTTP $STATUS (pode ser problema de DNS/SSL, verifique manualmente)"
            fi
          else
            echo "PRODUCTION_DOMAIN não configurado, pulando check externo."
          fi
