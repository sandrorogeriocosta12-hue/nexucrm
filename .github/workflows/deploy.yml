name: Deploy to Production (Locaweb)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────
      # 1. Checkout do código no runner do GitHub
      # ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────
      # 2. Configurar SSH (chave para acessar a Locaweb)
      # ─────────────────────────────────────────────────────────
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "Host locaweb" >> ~/.ssh/config
          echo "  HostName ${{ secrets.SERVER_HOST }}" >> ~/.ssh/config
          echo "  User ${{ secrets.SERVER_USER }}" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_rsa" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      # ─────────────────────────────────────────────────────────
      # 3. Criar arquivos .env no runner (a partir dos Secrets)
      #    Serão enviados junto com o rsync, mas separadamente
      # ─────────────────────────────────────────────────────────
      - name: Criar arquivos de configuração
        run: |
          cat > .env << 'ENVEOF'
          ${{ secrets.PRODUCTION_ENV }}
          ENVEOF
          cat > evolution.env << 'ENVEOF'
          ${{ secrets.EVOLUTION_ENV }}
          ENVEOF
          chmod 600 .env evolution.env

      # ─────────────────────────────────────────────────────────
      # 4. Criar pasta de destino no servidor
      # ─────────────────────────────────────────────────────────
      - name: Preparar pasta no servidor
        run: |
          ssh locaweb "mkdir -p ${{ secrets.DEPLOY_PATH }}"

      # ─────────────────────────────────────────────────────────
      # 5. Enviar código via rsync (runner → servidor)
      #    O runner já tem o código: não precisa de git clone no servidor
      # ─────────────────────────────────────────────────────────
      - name: Enviar código para o servidor
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='**/__pycache__/' \
            --exclude='**/*.pyc' \
            --exclude='venv/' \
            --exclude='.venv/' \
            --exclude='node_modules/' \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/
          echo "Código enviado: $(git log -1 --oneline)"

      # ─────────────────────────────────────────────────────────
      # 6. Subir postgres, redis e backend
      # ─────────────────────────────────────────────────────────
      - name: Subir postgres, redis e backend
        run: |
          ssh locaweb bash << 'ENDSSH'
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose pull postgres redis 2>/dev/null || true
            docker compose up -d --build postgres redis backend frontend
            echo "Aguardando PostgreSQL..."
            for i in $(seq 1 30); do
              if docker compose exec -T postgres pg_isready -U vexus > /dev/null 2>&1; then
                echo "PostgreSQL pronto."
                break
              fi
              echo "  tentativa $i/30..."
              sleep 3
            done
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 7. Inicializar banco de dados
      # ─────────────────────────────────────────────────────────
      - name: Inicializar banco de dados
        run: |
          ssh locaweb bash << 'ENDSSH'
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose exec -T postgres psql -U vexus -d vexus_db -c "
              CREATE SCHEMA IF NOT EXISTS vexus;
              GRANT ALL ON SCHEMA vexus TO vexus;
              ALTER DEFAULT PRIVILEGES IN SCHEMA vexus GRANT ALL ON TABLES TO vexus;
            " 2>/dev/null || true
            docker compose exec -T postgres psql -U vexus -c \
              "SELECT 1 FROM pg_database WHERE datname='vexus_crm'" | grep -q 1 || \
              docker compose exec -T postgres psql -U vexus -c "CREATE DATABASE vexus_crm;" || true
            docker compose exec -T postgres psql -U vexus -d vexus_crm -c "
              CREATE SCHEMA IF NOT EXISTS vexus;
              GRANT ALL ON SCHEMA vexus TO vexus;
              ALTER DEFAULT PRIVILEGES IN SCHEMA vexus GRANT ALL ON TABLES TO vexus;
            " 2>/dev/null || true
            echo "Banco inicializado."
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 8. Subir Evolution API (WhatsApp)
      # ─────────────────────────────────────────────────────────
      - name: Subir Evolution API
        run: |
          ssh locaweb bash << 'ENDSSH'
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose stop evolution-api 2>/dev/null || true
            docker compose rm -f evolution-api 2>/dev/null || true
            docker compose up -d evolution-api
            echo "Aguardando Evolution API (até 2 min)..."
            for i in $(seq 1 24); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "0")
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
                echo "Evolution API pronta (HTTP $STATUS)."
                break
              fi
              echo "  tentativa $i/24 (HTTP $STATUS)..."
              sleep 5
            done
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 9. Corrigir migrations Prisma travadas
      # ─────────────────────────────────────────────────────────
      - name: Limpar migrations Prisma pendentes
        run: |
          ssh locaweb bash << 'ENDSSH'
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose exec -T postgres psql -U vexus -d vexus_crm -c "
              DELETE FROM vexus._prisma_migrations
              WHERE finished_at IS NULL
                AND rolled_back_at IS NULL
                AND started_at < NOW() - INTERVAL '5 minutes';
            " 2>/dev/null && echo "Migrations limpas." || echo "Tabela ainda não existe (ok)."
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 10. Limpeza
      # ─────────────────────────────────────────────────────────
      - name: Limpar imagens antigas
        run: |
          ssh locaweb bash << 'ENDSSH'
            docker image prune -f --filter "until=48h" 2>/dev/null || true
            docker container prune -f 2>/dev/null || true
          ENDSSH

      # ─────────────────────────────────────────────────────────
      # 11. Health checks finais
      # ─────────────────────────────────────────────────────────
      - name: Health checks
        run: |
          ssh locaweb bash << 'ENDSSH'
            echo "=== Containers em execução ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            BACKEND=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health 2>/dev/null || echo "0")
            [ "$BACKEND" = "200" ] && echo "✅ Backend OK" || echo "⚠️  Backend HTTP $BACKEND"

            EVOLUTION=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "0")
            { [ "$EVOLUTION" = "200" ] || [ "$EVOLUTION" = "401" ]; } && echo "✅ Evolution API OK" || echo "⚠️  Evolution API HTTP $EVOLUTION"
          ENDSSH

      - name: Resultado do deploy
        run: |
          echo "✅ Deploy concluído: $(git log -1 --oneline)"
          echo "Servidor: ${{ secrets.SERVER_HOST }}"
          echo "Pasta: ${{ secrets.DEPLOY_PATH }}"
