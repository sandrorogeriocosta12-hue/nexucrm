<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexus IA - Agentes IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vexus-theme.css">
    <style>
      body { background: linear-gradient(135deg, #0A1120 0%, #162538 50%, #0A1120 100%); min-height: 100vh; }
      .nav-glow { box-shadow: 0 0 30px rgba(0, 209, 255, 0.1); border-bottom: 1px solid rgba(0, 209, 255, 0.2); }
      .card-glow { box-shadow: 0 0 20px rgba(0, 209, 255, 0.1), inset 0 1px 0 rgba(0, 209, 255, 0.15); transition: all 0.3s; }
      .card-glow:hover { box-shadow: 0 0 40px rgba(0, 209, 255, 0.2), inset 0 1px 0 rgba(0, 209, 255, 0.2); transform: translateY(-2px); }
      .logout-btn { @apply bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 transition; }
      .agent-card { @apply bg-gradient-to-br from-[#1F2D42] to-[#161F32] hover:from-[#243548] hover:to-[#1B2639] transition-all rounded-lg border border-[#2D3F4F] p-6 card-glow; }
      .progress-bar { @apply bg-[#0F1824] rounded-full h-2; }
      .progress-fill { @apply h-2 rounded-full bg-gradient-to-r from-[#00D1FF] to-[#0062FF]; }
      .status-badge { @apply px-3 py-1 rounded text-sm font-semibold; }
      .status-online { @apply bg-green-900/30 text-green-300 border border-green-600/50; }
      .status-busy { @apply bg-yellow-900/30 text-yellow-300 border border-yellow-600/50; }
      .status-offline { @apply bg-gray-900/30 text-gray-400 border border-gray-600/50; }
    </style>
</head>
<body>
    <nav class="bg-gradient-to-b from-[#161F32] to-[#0F1824] nav-glow sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <a href="index.html" class="text-2xl font-bold text-[#00D1FF]">🚀 Vexus</a>
            <ul class="flex space-x-6">
                <li><a href="dashboard.html" class="text-gray-400 hover:text-[#00D1FF]">💼 Dashboard</a></li>
                <li><a href="admin.html" class="text-gray-400 hover:text-[#00D1FF]">🏥 Admin</a></li>
                <li><a href="leads.html" class="text-gray-400 hover:text-[#00D1FF]">📋 Leads</a></li>
                <li><a href="appointments.html" class="text-gray-400 hover:text-[#00D1FF]">📅 Agendamentos</a></li>
                <li><a href="agents.html" class="text-[#00D1FF] font-semibold">🤖 Agentes IA</a></li>
            </ul>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold text-[#00D1FF]">🤖 Agentes IA</h1>
                <p class="text-gray-400 mt-1">Gerencie e configure seus agentes de inteligência artificial</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-gray-500" id="userInfo">Carregando...</span>
                <button class="logout-btn">Logout</button>
            </div>
        </header>

        <div class="card-glow bg-[#161F32] rounded-xl p-6 mb-8 border border-[#2D3F4F]">
            <h2 class="text-xl font-semibold text-[#00D1FF] mb-6">🤖 Agentes Disponíveis</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="agentsList">
                <p class="col-span-full text-center text-gray-500">Carregando agentes...</p>
            </div>
        </div>

        <div class="card-glow bg-[#161F32] rounded-xl p-6 border border-[#2D3F4F]">
            <h2 class="text-xl font-semibold text-[#00D1FF] mb-6">📊 Resumo de Performance</h2>
            <div class="overflow-x-auto rounded-lg">
                <table class="w-full">
                    <thead class="bg-[#0F1824] border-b border-[#00D1FF]/30">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-[#00D1FF] uppercase">Agente</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-[#00D1FF] uppercase">Modelo</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-[#00D1FF] uppercase">Performance</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-[#00D1FF] uppercase">Status</th>
                        </tr>
                    </thead>
                    <tbody id="performanceTable" class="divide-y divide-[#2D3F4F]">
                        <tr><td colspan="4" class="text-center py-4 text-gray-500">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080';

        async function apiCall(endpoint) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) throw new Error('API Error');
                return response.json();
            } catch (error) {
                console.error('Error:', error);
                return null;
            }
        }

        async function loadAgents() {
            const data = await apiCall('/agents');
            if (data && data.agents) {
                const agentsList = document.getElementById('agentsList');
                const performanceTable = document.getElementById('performanceTable');

                agentsList.innerHTML = '';
                performanceTable.innerHTML = '';

                data.agents.forEach(agent => {
                    const perfPercent = Math.round(agent.performance * 100);

                    // Agent card
                    const card = document.createElement('div');
                    card.className = 'agent-card';
                    card.innerHTML = `
                        <h3>${agent.name}</h3>
                        <span class="model">${agent.model}</span>
                        <p style="margin-top: 10px; font-size: 14px;">Agente de IA especializado em vendas e atendimento ao cliente.</p>
                        <div class="performance">
                            <div class="progress">
                                <div class="progress-bar" style="width: ${perfPercent}%"></div>
                            </div>
                            <span>${perfPercent}%</span>
                        </div>
                        <span class="status-badge">${agent.status}</span>
                        <button onclick="configureAgent(${agent.id})">⚙️ Configurar</button>
                    `;
                    agentsList.appendChild(card);

                    // Performance table row
                    const row = document.createElement('tr');
                    row.style.borderBottom = '1px solid #eee';
                    row.innerHTML = `
                        <td style="padding: 12px;"><strong>${agent.name}</strong></td>
                        <td style="padding: 12px;">${agent.model}</td>
                        <td style="padding: 12px;">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <div style="background: #f5f7fa; border-radius: 4px; height: 8px; width: 100px;">
                                    <div style="background: #00D1FF; height: 100%; width: ${perfPercent}%; border-radius: 4px;"></div>
                                </div>
                                <span>${perfPercent}%</span>
                            </div>
                        </td>
                        <td style="padding: 12px;"><span style="background: #d4edda; color: #155724; padding: 4px 8px; border-radius: 3px; font-weight: 600; font-size: 12px;">${agent.status}</span></td>
                    `;
                    performanceTable.appendChild(row);
                });
            }
        }

        async function loadUserInfo() {
            const user = await apiCall('/me');
            if (user) {
                document.getElementById('userInfo').textContent = `👤 ${user.name}`;
            }
        }

        function configureAgent(agentId) {
            alert(`Configurações do agente ${agentId} - Em desenvolvimento`);
        }

        function logout() {
            if (confirm('Deseja sair?')) {
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadAgents();
            fetch('components.html')
                .then(r => r.text())
                .then(html => {
                    const div = document.createElement('div');
                    div.style.display = 'none';
                    div.innerHTML = html;
                    document.body.appendChild(div);
                });
        });
    </script>
</body>
</html>
