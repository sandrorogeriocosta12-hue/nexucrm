<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexus IA - Gerenciador de Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vexus-theme.css">
    <style>
      body { background: linear-gradient(135deg, #0A1120 0%, #162538 50%, #0A1120 100%); min-height: 100vh; }
      .nav-glow { box-shadow: 0 0 30px rgba(0, 209, 255, 0.1); border-bottom: 1px solid rgba(0, 209, 255, 0.2); }
      .card-glow { box-shadow: 0 0 20px rgba(0, 209, 255, 0.1), inset 0 1px 0 rgba(0, 209, 255, 0.15); transition: all 0.3s; }
      .card-glow:hover { box-shadow: 0 0 40px rgba(0, 209, 255, 0.2), inset 0 1px 0 rgba(0, 209, 255, 0.2); transform: translateY(-2px); }
      .logout-btn { @apply bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 transition; }
      .stat-box { background: linear-gradient(135deg, rgba(0, 209, 255, 0.05), rgba(0, 98, 255, 0.05)); border: 1px solid rgba(0, 209, 255, 0.2); }
    </style>
</head>
<body>
    <nav class="bg-gradient-to-b from-[#161F32] to-[#0F1824] nav-glow sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <a href="index.html" class="text-2xl font-bold text-[#00D1FF]">🚀 Vexus</a>
            <ul class="flex space-x-6">
                <li><a href="dashboard.html" class="text-gray-400 hover:text-[#00D1FF]">💼 Dashboard</a></li>
                <li><a href="admin.html" class="text-gray-400 hover:text-[#00D1FF]">🏥 Admin</a></li>
                <li><a href="leads.html" class="text-[#00D1FF] font-semibold">📋 Leads</a></li>
                <li><a href="appointments.html" class="text-gray-400 hover:text-[#00D1FF]">📅 Agendamentos</a></li>
                <li><a href="agents.html" class="text-gray-400 hover:text-[#00D1FF]">🤖 Agentes IA</a></li>
            </ul>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold text-[#00D1FF]">📋 Leads</h1>
                <p class="text-gray-400 mt-1">Visualize, analise e gerencie seus leads</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-gray-500" id="userInfo">Carregando...</span>
                <button class="logout-btn">Logout</button>
            </div>
        </header>

        <div class="card-glow bg-[#161F32] rounded-xl p-6 mb-8 border border-[#2D3F4F]">
            <h2 class="text-xl font-semibold text-[#00D1FF] mb-4">🔍 Pesquisar Leads</h2>
            <div class="mb-4">
                <input type="text" id="searchBox" placeholder="Digite nome, email ou empresa..." onkeyup="filterLeads()" class="w-full px-4 py-3 bg-[#0F1824] border border-[#2D3F4F] rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#00D1FF] focus:shadow-lg focus:shadow-[#00D1FF]/20" />
            </div>
            <div id="leadsList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 min-h-[300px]">
                <p class="text-center text-gray-500 col-span-full">Carregando leads...</p>
            </div>
        </div>

        <div class="card-glow bg-[#161F32] rounded-xl p-6 border border-[#2D3F4F]">
            <h2 class="text-xl font-semibold text-[#00D1FF] mb-6">📊 Estatísticas</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                <div class="stat-box rounded-lg p-4 border border-[#2D3F4F]">
                    <p class="text-gray-400 text-sm">Total de Leads</p>
                    <p class="text-3xl font-bold text-[#00D1FF] mt-2" id="totalLeads">-</p>
                </div>
                <div class="stat-box rounded-lg p-4 border border-[#FF5555]/30 bg-gradient-to-br from-[#FF5555]/10 to-[#FF0000]/5">
                    <p class="text-gray-400 text-sm">Leads Quentes 🔥</p>
                    <p class="text-3xl font-bold text-[#FF6666] mt-2" id="hotLeads">-</p>
                </div>
                <div class="stat-box rounded-lg p-4 border border-[#FFA500]/30 bg-gradient-to-br from-[#FFA500]/10 to-[#FF8C00]/5">
                    <p class="text-gray-400 text-sm">Leads Mornos 🌤️</p>
                    <p class="text-3xl font-bold text-[#FFB84D] mt-2" id="warmLeads">-</p>
                </div>
                <div class="stat-box rounded-lg p-4 border border-[#00D1FF]/30 bg-gradient-to-br from-[#00D1FF]/10 to-[#0062FF]/5">
                    <p class="text-gray-400 text-sm">Leads Frios ❄️</p>
                    <p class="text-3xl font-bold text-[#00D1FF] mt-2" id="coldLeads">-</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080';
        let allLeads = [];

        async function apiCall(endpoint) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) throw new Error('API Error');
                return response.json();
            } catch (error) {
                console.error('Error:', error);
                return null;
            }
        }

        async function loadLeadScores() {
            // call fuzzy endpoint for each lead if available
            if (!allLeads || allLeads.length === 0) return;
            for (let lead of allLeads) {
                try {
                    const resp = await fetch('/fuzzy/lead-score', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ engagement: lead.engagement || 0, likelihood: lead.likelihood || 0 })
                    });
                    const info = await resp.json();
                    lead.score = info.score;
                    lead.stage = info.classification;
                } catch (err) {
                    // keep existing score if call fails
                }
            }
        }

        async function loadLeads() {
            const data = await apiCall('/leads');
            if (data && data.leads) {
                allLeads = data.leads;
                // compute fuzzy scores if endpoint exists
                await loadLeadScores();
                renderLeads(allLeads);
                updateStats();
            }
        }

        function renderLeads(leads) {
            const container = document.getElementById('leadsList');
            container.innerHTML = '';

            if (leads.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">Nenhum lead encontrado</p>';
                return;
            }

            leads.forEach(lead => {
                // clone reusable card component
                const tpl = document.getElementById('lead-card-template');
                if (tpl) {
                    const card = tpl.cloneNode(true);
                    card.id = '';
                    card.style.display = '';
                    card.querySelector('[data-lead-name]').textContent = lead.name;
                    card.querySelector('[data-lead-company]').textContent = lead.company || '';
                    card.querySelector('[data-lead-badge]').textContent = lead.stage;
                    card.querySelector('[data-lead-last-contact]').textContent = lead.last_contact || '';
                    card.querySelector('[data-lead-value]').textContent = "R$" + (lead.value || 0).toFixed(2);
                    // attach score color border
                    const scoreColor = lead.score >= 80 ? '#e53e3e' : lead.score >= 60 ? '#d69e2e' : '#3182ce';
                    card.style.borderLeftColor = scoreColor;
                    container.appendChild(card);
                } else {
                    // fallback
                    const scoreColor = lead.score >= 80 ? 'hot' : lead.score >= 60 ? 'warm' : 'cold';
                    const item = document.createElement('div');
                    item.className = 'lead-item';
                    item.innerHTML = `
                        <strong>${lead.name}</strong>
                        <small>${lead.email}</small>
                        <div>
                            Score: <strong>${lead.score}/100</strong>
                            <span class="badge ${scoreColor}">${lead.stage}</span>
                        </div>
                    `;
                    container.appendChild(item);
                }
            });
        }

        function filterLeads() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allLeads.filter(lead =>
                lead.name.toLowerCase().includes(search) ||
                lead.email.toLowerCase().includes(search)
            );
            renderLeads(filtered);
        }

        function updateStats() {
            document.getElementById('totalLeads').textContent = allLeads.length;
            document.getElementById('hotLeads').textContent = allLeads.filter(l => l.score >= 80).length;
            document.getElementById('warmLeads').textContent = allLeads.filter(l => l.score >= 60 && l.score < 80).length;
            document.getElementById('coldLeads').textContent = allLeads.filter(l => l.score < 60).length;
        }

        async function loadUserInfo() {
            const user = await apiCall('/me');
            if (user) {
                document.getElementById('userInfo').textContent = `👤 ${user.name}`;
            }
        }

        function logout() {
            if (confirm('Deseja sair?')) {
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadLeads();
            // load shared component templates
            fetch('components.html')
                .then(r => r.text())
                .then(html => {
                    const div = document.createElement('div');
                    div.style.display = 'none';
                    div.innerHTML = html;
                    document.body.appendChild(div);
                });
        });
    </script>
</body>
</html>
