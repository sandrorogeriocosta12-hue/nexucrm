<!-- Reusable components for Vexus UI -->

<!-- card view for lead -->
<div class="glass-card p-4 rounded-lg border-l-4 border-l-transparent hover:border-l-[#8B5CF6] transition" id="lead-card-template">
  <div class="flex justify-between">
    <h4 class="font-medium" data-lead-name></h4>
    <span class="text-xs px-2 py-1 rounded-full" data-lead-badge></span>
  </div>
  <p class="text-sm text-gray-400" data-lead-company></p>
  <div class="mt-3 flex gap-2">
    <span class="text-xs bg-[#2D3748] px-2 py-1 rounded" data-lead-last-contact></span>
    <span class="text-xs bg-[#2D3748] px-2 py-1 rounded" data-lead-value></span>
  </div>
</div>

<!-- button variants -->
<button class="btn-glow" id="btn-glow-template">Click</button>
<button class="btn-secondary" id="btn-secondary-template">Secondary</button>

<!-- modal template -->
<div class="modal-overlay" id="modal-template" style="display:none;">
  <div class="modal">
    <slot></slot>
  </div>
</div>
