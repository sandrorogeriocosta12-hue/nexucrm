version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vexus_crm_postgres
    environment:
      POSTGRES_DB: vexus_crm
      POSTGRES_USER: vexus
      POSTGRES_PASSWORD: vexus_secure_pass_2025
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vexus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vexus_crm_redis
    ports:
      - "6379:6379"
    networks:
      - vexus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vexus CRM API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vexus_crm_api
    environment:
      DATABASE_URL: postgresql://vexus:vexus_secure_pass_2025@postgres:5432/vexus_crm
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-test-key}
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vexus_network
    volumes:
      - ./:/app
      - /app/__pycache__
    command: uvicorn vexus_crm.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (React)
  frontend:
    image: node:18-alpine
    container_name: vexus_crm_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    networks:
      - vexus_network
    volumes:
      - ./frontend:/app
    command: npm start

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vexus_crm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - vexus_network

networks:
  vexus_network:
    driver: bridge

volumes:
  postgres_data:
