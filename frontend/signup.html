<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Criar Conta – Nexus CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0F172A; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #db2777); transition: all 0.25s; }
        .btn-primary:hover:not(:disabled) { background: linear-gradient(135deg, #6d28d9, #be185d); transform: translateY(-1px); box-shadow: 0 10px 28px rgba(124,58,237,0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        input, select { outline: none; }
        input:focus, select:focus { border-color: #7c3aed !important; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.75rem 1.25rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 600; z-index: 9999; animation: slideIn 0.3s ease; }
        .toast.ok  { background: #064e3b; border: 1px solid #10b981; color: #6ee7b7; }
        .toast.err { background: #4c0519; border: 1px solid #f43f5e; color: #fda4af; }
        @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-10">

    <!-- Background glows -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-pink-600/10 rounded-full blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-md">
        <div class="bg-slate-900/80 border border-slate-800 rounded-2xl p-8 shadow-2xl backdrop-blur-sm">

            <!-- Logo -->
            <div class="flex flex-col items-center gap-3 mb-8">
                <div class="w-14 h-14 bg-gradient-to-br from-purple-500 to-pink-600 rounded-2xl flex items-center justify-center font-bold text-white text-2xl shadow-lg shadow-purple-500/30">N</div>
                <div class="text-center">
                    <h1 class="text-lg font-bold text-white">Nexus CRM</h1>
                    <p class="text-slate-500 text-sm">Gestão inteligente de relacionamentos</p>
                </div>
            </div>

            <h2 class="text-2xl font-bold text-white text-center mb-1">Criar sua conta</h2>
            <p class="text-slate-400 text-sm text-center mb-6">Comece gratuitamente, sem cartão</p>

            <!-- Error / Success boxes -->
            <div id="errorBox"   class="hidden bg-red-950/50 border border-red-800/50 text-red-300 text-sm rounded-xl px-4 py-3 mb-5"></div>
            <div id="successBox" class="hidden bg-green-950/50 border border-green-800/50 text-green-300 text-sm rounded-xl px-4 py-3 mb-5"></div>

            <form id="signupForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Nome</label>
                        <input type="text" id="firstName" placeholder="João" required
                            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 text-sm transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Sobrenome</label>
                        <input type="text" id="lastName" placeholder="Silva" required
                            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 text-sm transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">E-mail</label>
                    <input type="email" id="email" placeholder="voce@empresa.com" required
                        class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 text-sm transition-all">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Empresa <span class="text-slate-600 normal-case font-normal">(opcional)</span></label>
                    <input type="text" id="company" placeholder="Sua Empresa Ltda"
                        class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 text-sm transition-all">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Senha</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required
                            class="w-full px-4 py-3 pr-12 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 text-sm transition-all">
                        <button type="button" onclick="togglePwd('password','tp1')" id="tp1"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors px-1 text-base">👁️</button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Confirmar Senha</label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" placeholder="Repita a senha" required
                            class="w-full px-4 py-3 pr-12 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 text-sm transition-all">
                        <button type="button" onclick="togglePwd('confirmPassword','tp2')" id="tp2"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors px-1 text-base">👁️</button>
                    </div>
                </div>

                <div class="flex items-start gap-3 pt-1">
                    <input type="checkbox" id="terms" required class="mt-0.5 w-4 h-4 accent-purple-500 flex-shrink-0">
                    <label for="terms" class="text-sm text-slate-400">
                        Concordo com os <a href="/terms" target="_blank" class="text-purple-400 hover:text-purple-300">Termos de Serviço</a>
                        e <a href="/privacy" target="_blank" class="text-purple-400 hover:text-purple-300">Política de Privacidade</a>
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary w-full py-3 rounded-xl font-bold text-white text-sm mt-2">
                    Criar Conta Gratuitamente
                </button>
            </form>

            <p class="text-center text-slate-400 text-sm mt-6">
                Já tem uma conta? <a href="/login" class="text-purple-400 hover:text-purple-300 font-semibold transition-colors">Fazer login</a>
            </p>
        </div>
    </div>

<script>
const API = window.location.origin;

function togglePwd(inputId, btnId) {
    const input = document.getElementById(inputId);
    const btn   = document.getElementById(btnId);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁️';
}

document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const email     = document.getElementById('email').value.trim();
    const company   = document.getElementById('company').value.trim();
    const password  = document.getElementById('password').value;
    const confirm   = document.getElementById('confirmPassword').value;
    const btn       = document.getElementById('submitBtn');
    const errBox    = document.getElementById('errorBox');
    const okBox     = document.getElementById('successBox');

    errBox.classList.add('hidden');
    okBox.classList.add('hidden');

    if (password !== confirm) {
        errBox.textContent = 'As senhas não coincidem';
        errBox.classList.remove('hidden');
        return;
    }
    if (password.length < 6) {
        errBox.textContent = 'Senha deve ter pelo menos 6 caracteres';
        errBox.classList.remove('hidden');
        return;
    }

    const fullName = `${firstName} ${lastName}`.trim();
    btn.disabled = true;
    btn.textContent = 'Criando conta...';

    try {
        const res  = await fetch(`${API}/api/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ name: fullName, email, password, company })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Erro ao criar conta');

        // Salvar dados para o dashboard
        if (data.access_token) {
            localStorage.setItem('nexus_token', data.access_token);
        }
        localStorage.setItem('user_email', email);
        localStorage.setItem('user_name',  fullName);
        if (company) localStorage.setItem('user_company', company);

        const plan = new URLSearchParams(window.location.search).get('plan')
                     || localStorage.getItem('selected_plan') || '';
        if (plan) localStorage.setItem('selected_plan', plan);

        okBox.textContent = '✅ Conta criada! Redirecionando...';
        okBox.classList.remove('hidden');
        toast('✅ Conta criada com sucesso!', 'ok');

        setTimeout(() => {
            window.location.href = plan ? '/payment' : '/';
        }, 1200);
    } catch (err) {
        errBox.textContent = err.message || 'Erro ao criar conta. Tente novamente.';
        errBox.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Criar Conta Gratuitamente';
    }
});

function toast(msg, type) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
