<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Redefinir Senha - Nexus Service</title>
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: linear-gradient(135deg, #0F172A 0%, #1a1f3a 50%, #0F172A 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Background effect */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(26, 86, 219, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .reset-page {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            min-height: 100vh;
        }

        .reset-container {
            width: 100%;
            max-width: 440px;
        }

        .reset-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1A56DB 0%, #7C3AED 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            box-shadow: 0 8px 32px rgba(26, 86, 219, 0.4);
        }

        .logo-info h2 {
            font-size: 18px;
            font-weight: 700;
            color: white;
            text-align: center;
        }

        .logo-info p {
            font-size: 13px;
            color: #94A3B8;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #E2E8F0;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: #64748B;
        }

        .form-input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .password-input-wrapper {
            position: relative;
        }

        .toggle-password-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748B;
            cursor: pointer;
            font-size: 16px;
            padding: 0.25rem;
            transition: color 0.2s ease;
        }

        .toggle-password-btn:hover {
            color: #E2E8F0;
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #1A56DB 0%, #7C3AED 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(26, 86, 219, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .reset-footer {
            text-align: center;
            font-size: 14px;
            color: #94A3B8;
        }

        .reset-footer a {
            color: #60A5FA;
            text-decoration: none;
            font-weight: 500;
        }

        .reset-footer a:hover {
            text-decoration: underline;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            color: #22C55E;
            text-align: center;
            display: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            color: #EF4444;
            text-align: center;
            display: none;
        }

        .password-strength {
            margin-top: 0.5rem;
            font-size: 12px;
            display: none;
        }

        .password-strength.weak {
            color: #EF4444;
        }

        .password-strength.medium {
            color: #F59E0B;
        }

        .password-strength.strong {
            color: #22C55E;
        }

        @media (max-width: 480px) {
            .reset-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="reset-page">
        <div class="reset-container">
            <div class="reset-card">
                <!-- Logo -->
                <div class="logo-container">
                    <div class="logo">N</div>
                    <div class="logo-info">
                        <h2>Nexus Service</h2>
                        <p>Redefinir Senha</p>
                    </div>
                </div>

                <!-- Success Message -->
                <div id="successMessage" class="success-message">
                    ✅ Senha redefinida com sucesso! Você será redirecionado para o login em instantes...
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="error-message">
                    ❌ Erro ao redefinir senha. O link pode ter expirado.
                </div>

                <!-- Form -->
                <form id="resetForm">
                    <div class="form-group">
                        <label for="password" class="form-label">Nova Senha</label>
                        <div class="password-input-wrapper">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input"
                                placeholder="Digite sua nova senha"
                                required
                                minlength="6"
                            >
                            <button type="button" id="togglePassword" class="toggle-password-btn" title="Mostrar/Esconder senha">👁️</button>
                        </div>
                        <div id="passwordStrength" class="password-strength"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirmar Nova Senha</label>
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            class="form-input"
                            placeholder="Confirme sua nova senha"
                            required
                            minlength="6"
                        >
                    </div>

                    <button type="submit" class="submit-btn">Redefinir Senha</button>
                </form>

                <!-- Footer -->
                <div class="reset-footer">
                    <a href="/login">← Voltar ao Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('resetForm');
        const successEl = document.getElementById('successMessage');
        const errorEl = document.getElementById('errorMessage');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordStrengthEl = document.getElementById('passwordStrength');

        // Get token from URL or script variable
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || window.resetToken;

        if (!token) {
            showError('Link inválido ou expirado. Solicite um novo link de recuperação.');
        }

        // Toggle mostrar/esconder senha
        document.getElementById('togglePassword').addEventListener('click', function(e) {
            e.preventDefault();
            const toggleBtn = this;

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
                toggleBtn.title = 'Esconder senha';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
                toggleBtn.title = 'Mostrar senha';
            }
        });

        // Password strength checker
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            let feedback = [];

            if (password.length >= 6) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^A-Za-z0-9]/)) strength++;

            passwordStrengthEl.style.display = password.length > 0 ? 'block' : 'none';

            if (strength < 3) {
                passwordStrengthEl.className = 'password-strength weak';
                passwordStrengthEl.textContent = 'Senha fraca - use letras maiúsculas, minúsculas, números e símbolos';
            } else if (strength < 4) {
                passwordStrengthEl.className = 'password-strength medium';
                passwordStrengthEl.textContent = 'Senha média - adicione mais caracteres especiais';
            } else {
                passwordStrengthEl.className = 'password-strength strong';
                passwordStrengthEl.textContent = 'Senha forte!';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!token) {
                showError('Link inválido. Solicite um novo link de recuperação.');
                return;
            }

            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const submitBtn = form.querySelector('button[type="submit"]');

            if (!password || !confirmPassword) {
                showError('Por favor, preencha todos os campos');
                return;
            }

            if (password.length < 6) {
                showError('A senha deve ter pelo menos 6 caracteres');
                return;
            }

            if (password !== confirmPassword) {
                showError('As senhas não coincidem');
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Redefinindo...';

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        new_password: password
                    })
                });

                if (response.ok) {
                    showSuccess();
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    const data = await response.json();
                    throw new Error(data.detail || 'Erro ao redefinir senha');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showError(error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Redefinir Senha';
            }
        });

        function showSuccess() {
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
            form.style.display = 'none';
        }

        function showError(message) {
            errorEl.textContent = '❌ ' + message;
            errorEl.style.display = 'block';
            successEl.style.display = 'none';
        }
    </script>
</body>
</html>
