<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Vexus CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <div id="sidebar"></div>
        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="header"></div>
            <main class="flex-1 overflow-y-auto p-6">
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <div class="border-b bg-gray-50">
                        <nav class="flex overflow-x-auto">
                            <button class="tab-active px-6 py-3 text-indigo-600 border-b-2 border-indigo-600 font-medium whitespace-nowrap" data-tab="general">⚙️ Geral</button>
                            <button class="tab px-6 py-3 text-gray-600 hover:text-indigo-600 whitespace-nowrap" data-tab="users">👥 Usuários</button>
                            <button class="tab px-6 py-3 text-gray-600 hover:text-indigo-600 whitespace-nowrap" data-tab="pipeline">📊 Pipeline</button>
                            <button class="tab px-6 py-3 text-gray-600 hover:text-indigo-600 whitespace-nowrap" data-tab="integrations">🔗 Integrações</button>
                        </nav>
                    </div>
                    <div id="settings-content" class="p-6">
                        <!-- Conteúdo dinâmico -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        fetch('/components/sidebar.html').then(r => r.text()).then(html => {
            const sidebar = document.getElementById('sidebar');
            if (sidebar) sidebar.innerHTML = html;
        });
        fetch('/components/header.html').then(r => r.text()).then(html => {
            const header = document.getElementById('header');
            if (header) header.innerHTML = html;
            const pageTitle = document.querySelector('.page-title');
            if (pageTitle) pageTitle.textContent = 'Configurações';
        });
        checkAuth();

        function loadTab(tab) {
            const content = document.getElementById('settings-content');
            if (tab === 'general') {
                content.innerHTML = `
                    <div>
                        <h3 class="text-lg font-semibold mb-4">Informações da Empresa</h3>
                        <form class="space-y-4 max-w-lg">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nome da empresa</label>
                                <input type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" value="Vexus CRM" >
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Moeda padrão</label>
                                <select class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <option selected>BRL (R$)</option>
                                    <option>USD ($)</option>
                                    <option>EUR (€)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Fuso horário</label>
                                <select class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <option selected>America/Sao_Paulo</option>
                                </select>
                            </div>
                            <div class="pt-4">
                                <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">Salvar alterações</button>
                            </div>
                        </form>
                    </div>
                `;
            } else if (tab === 'users') {
                content.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-semibold">Gestão de Usuários</h3>
                            <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700 transition">+ Convidar usuário</button>
                        </div>
                        <div class="space-y-3">
                            <div class="border rounded-lg p-4 flex justify-between items-center">
                                <div>
                                    <p class="font-medium">Você</p>
                                    <p class="text-sm text-gray-600">Admin</p>
                                </div>
                                <span class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-medium">Proprietário</span>
                            </div>
                        </div>
                    </div>
                `;
            } else if (tab === 'pipeline') {
                content.innerHTML = `
                    <div>
                        <h3 class="text-lg font-semibold mb-4">Estágios do Pipeline</h3>
                        <div class="space-y-2">
                            <div class="flex items-center space-x-2 p-2 border rounded-lg">
                                <span class="text-sm">1. Lead</span>
                                <button class="ml-auto text-gray-400 hover:text-red-600">✕</button>
                            </div>
                            <div class="flex items-center space-x-2 p-2 border rounded-lg">
                                <span class="text-sm">2. Qualificado</span>
                                <button class="ml-auto text-gray-400 hover:text-red-600">✕</button>
                            </div>
                            <div class="flex items-center space-x-2 p-2 border rounded-lg">
                                <span class="text-sm">3. Proposta</span>
                                <button class="ml-auto text-gray-400 hover:text-red-600">✕</button>
                            </div>
                            <div class="flex items-center space-x-2 p-2 border rounded-lg">
                                <span class="text-sm">4. Negociação</span>
                                <button class="ml-auto text-gray-400 hover:text-red-600">✕</button>
                            </div>
                            <div class="flex items-center space-x-2 p-2 border rounded-lg">
                                <span class="text-sm">5. Fechado</span>
                                <button class="ml-auto text-gray-400 hover:text-red-600">✕</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (tab === 'integrations') {
                content.innerHTML = `
                    <div>
                        <h3 class="text-lg font-semibold mb-4">Integrações</h3>
                        <div class="space-y-3">
                            <div class="border rounded-lg p-4 flex justify-between items-center">
                                <div>
                                    <p class="font-medium">Gmail</p>
                                    <p class="text-sm text-gray-600">Integre e-mails com sua conta Gmail</p>
                                </div>
                                <button class="text-indigo-600 hover:text-indigo-700 font-medium text-sm">Conectar</button>
                            </div>
                            <div class="border rounded-lg p-4 flex justify-between items-center">
                                <div>
                                    <p class="font-medium">Calendário Google</p>
                                    <p class="text-sm text-gray-600">Sincronize compromissos automaticamente</p>
                                </div>
                                <button class="text-indigo-600 hover:text-indigo-700 font-medium text-sm">Conectar</button>
                            </div>
                            <div class="border rounded-lg p-4 flex justify-between items-center">
                                <div>
                                    <p class="font-medium">Stripe</p>
                                    <p class="text-sm text-gray-600">Gerencie pagamentos e subscriptions</p>
                                </div>
                                <button class="text-indigo-600 hover:text-indigo-700 font-medium text-sm">Conectar</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // Event listeners para as abas
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab, .tab-active').forEach(el => {
                    el.classList.remove('tab-active', 'text-indigo-600', 'border-b-2', 'border-indigo-600');
                    el.classList.add('text-gray-600');
                });
                this.classList.add('tab-active', 'text-indigo-600', 'border-b-2', 'border-indigo-600');
                loadTab(this.dataset.tab);
            });
        });

        loadTab('general');
    </script>
</body>
</html>
