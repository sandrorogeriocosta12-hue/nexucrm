<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nexus Service</title>
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: linear-gradient(135deg, #0F172A 0%, #1a1f3a 50%, #0F172A 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Background effect */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(26, 86, 219, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .login-page {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            min-height: 100vh;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1A56DB 0%, #7C3AED 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            box-shadow: 0 8px 32px rgba(26, 86, 219, 0.4);
        }

        .logo-info h2 {
            font-size: 18px;
            font-weight: 700;
            color: white;
            text-align: center;
        }

        .logo-info p {
            font-size: 13px;
            color: #94A3B8;
            text-align: center;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            font-size: 14px;
            color: #CBD5E1;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
            color: white;
        }

        .form-input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(51, 65, 85, 0.6);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .form-input::placeholder {
            color: #64748B;
        }

        .form-input:focus {
            outline: none;
            border-color: #7C3AED;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
            background: rgba(15, 23, 42, 0.95);
        }

        .submit-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, #1A56DB 0%, #7C3AED 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            box-shadow: 0 8px 24px rgba(26, 86, 219, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(26, 86, 219, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert-message {
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #FCA5A5;
        }

        .alert-message.show {
            display: flex;
        }

        .login-footer {
            text-align: center;
            font-size: 14px;
            color: #CBD5E1;
        }

        .login-footer a {
            color: #7C3AED;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-footer a:hover {
            color: #1A56DB;
        }

        @media (max-width: 640px) {
            .login-card {
                padding: 1.5rem;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <!-- Logo -->
                <div class="logo-container">
                    <div class="logo">N</div>
                    <div class="logo-info">
                        <h2>Nexus Service</h2>
                        <p>Lead Scoring IA</p>
                    </div>
                </div>

                <!-- Header -->
                <div class="login-header">
                    <h1>Bem-vindo de volta</h1>
                    <p>Acesse sua conta para gerenciar leads</p>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="alert-message error">
                    <span>✕</span>
                    <span id="errorText"></span>
                </div>

                <!-- Form -->
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email" class="form-label">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            class="form-input"
                            placeholder="seu@email.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Senha</label>
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="••••••"
                            required
                        >
                    </div>

                    <button type="submit" class="submit-btn">Entrar na Conta</button>
                </form>

                <!-- Footer -->
                <div class="login-footer">
                    Não tem conta? <a href="/signup">Solicite acesso grátis</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('errorMessage');
        const errorTextEl = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = form.querySelector('button[type="submit"]');

            // Clear error
            errorEl.classList.remove('show');

            // Validate
            if (!email || !password) {
                showError('Email e senha são obrigatórios');
                return;
            }

            if (!NexusUtils.isValidEmail(email)) {
                showError('Email inválido');
                return;
            }

            if (password.length < 6) {
                showError('Senha deve ter pelo menos 6 caracteres');
                return;
            }

            // Submit
            btn.disabled = true;
            btn.textContent = 'Entrando...';

            try {
                await login(email, password);
                window.location.href = '/dashboard';
            } catch (err) {
                showError(err.message || 'Erro ao fazer login. Tente novamente.');
                btn.disabled = false;
                btn.textContent = 'Entrar na Conta';
            }
        });

        function showError(message) {
            errorTextEl.textContent = message;
            errorEl.classList.add('show');
            NexusUtils.toastError(message);
        }
    </script>
</body>
</html>
