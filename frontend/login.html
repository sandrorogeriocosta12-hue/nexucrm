<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Login – Nexus CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0F172A; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #a78bfa, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #db2777); transition: all 0.25s; }
        .btn-primary:hover:not(:disabled) { background: linear-gradient(135deg, #6d28d9, #be185d); transform: translateY(-1px); box-shadow: 0 10px 28px rgba(124,58,237,0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        input { outline: none; }
        input:focus { border-color: #7c3aed !important; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.75rem 1.25rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 600; z-index: 9999; animation: slideIn 0.3s ease; }
        .toast.ok  { background: #064e3b; border: 1px solid #10b981; color: #6ee7b7; }
        .toast.err { background: #4c0519; border: 1px solid #f43f5e; color: #fda4af; }
        @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Background glows -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-pink-600/10 rounded-full blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-md">
        <div class="bg-slate-900/80 border border-slate-800 rounded-2xl p-8 shadow-2xl backdrop-blur-sm">

            <!-- Logo -->
            <div class="flex flex-col items-center gap-3 mb-8">
                <div class="w-14 h-14 bg-gradient-to-br from-purple-500 to-pink-600 rounded-2xl flex items-center justify-center font-bold text-white text-2xl shadow-lg shadow-purple-500/30">N</div>
                <div class="text-center">
                    <h1 class="text-lg font-bold text-white">Nexus CRM</h1>
                    <p class="text-slate-500 text-sm">Gestão inteligente de relacionamentos</p>
                </div>
            </div>

            <h2 class="text-2xl font-bold text-white text-center mb-1">Bem-vindo de volta</h2>
            <p class="text-slate-400 text-sm text-center mb-6">Acesse sua conta para continuar</p>

            <!-- Error box -->
            <div id="errorBox" class="hidden bg-red-950/50 border border-red-800/50 text-red-300 text-sm rounded-xl px-4 py-3 mb-5"></div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required
                        class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 text-sm transition-all">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Senha</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="••••••••" required
                            class="w-full px-4 py-3 pr-12 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 text-sm transition-all">
                        <button type="button" id="togglePwd"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors px-1 text-base">👁️</button>
                    </div>
                    <div class="text-right mt-1.5">
                        <a href="/forgot-password" class="text-purple-400 hover:text-purple-300 text-xs transition-colors">Esqueci minha senha</a>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary w-full py-3 rounded-xl font-bold text-white text-sm mt-2">
                    Entrar na Conta
                </button>
            </form>

            <p class="text-center text-slate-400 text-sm mt-6">
                Não tem conta? <a href="/signup" class="text-purple-400 hover:text-purple-300 font-semibold transition-colors">Criar conta grátis</a>
            </p>
        </div>
    </div>

<script>
const API = window.location.origin;

document.getElementById('togglePwd').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const show = pwd.type === 'password';
    pwd.type = show ? 'text' : 'password';
    this.textContent = show ? '🙈' : '👁️';
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submitBtn');
    const errBox   = document.getElementById('errorBox');

    errBox.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
        const res  = await fetch(`${API}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Credenciais inválidas');

        // Salva token com a chave que o dashboard usa
        localStorage.setItem('nexus_token', data.access_token);
        localStorage.setItem('user_email',  data.email || email);
        localStorage.setItem('user_name',   data.name  || '');

        toast('✅ Login realizado!', 'ok');
        setTimeout(() => { window.location.href = '/'; }, 600);
    } catch (err) {
        errBox.textContent = err.message || 'Erro ao fazer login';
        errBox.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Entrar na Conta';
    }
});

function toast(msg, type) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
