<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Service - Login Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-box {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 28px;
            color: white;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-950 to-black flex items-center justify-center h-screen">
    <div class="w-96 p-8 rounded-lg border border-slate-700 bg-gradient-to-br from-slate-800 to-slate-900 shadow-2xl">
        
        <div class="flex items-center justify-center mb-6">
            <div class="logo-box">N</div>
        </div>
        
        <h1 class="text-3xl font-bold text-center gradient-text mb-1">Nexus Service</h1>
        <p class="text-center text-gray-400 text-sm mb-2">Lead Scoring em Tempo Real</p>
        <p class="text-center text-gray-500 text-xs mb-6">Qualifique leads automaticamente com IA</p>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">E-mail</label>
                <input type="email" id="email" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" placeholder="seu@email.com" required>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                <input type="password" id="password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" placeholder="••••••" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700 transition font-medium">Entrar</button>
        </form>

        <div id="errorMessage" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>

        <p class="text-center text-sm text-gray-600 mt-6">
            Não tem conta? <a href="#" class="text-indigo-600 font-semibold hover:underline">Solicite acesso</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');
            
            try {
                errorEl.classList.add('hidden');
                if (!email || !password) throw new Error('Email e senha obrigatórios');
                await login(email, password);
                window.location.href = '/dashboard';
            } catch (err) {
                errorEl.textContent = err.message || 'Erro ao fazer login. Tente novamente.';
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
