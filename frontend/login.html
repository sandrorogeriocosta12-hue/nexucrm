<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nexus Service</title>
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0F172A 0%, #1a1f3a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: var(--spacing-lg);
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: var(--spacing-2xl);
        }

        .logo-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-md);
        }

        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 10px 25px rgba(26, 86, 219, 0.3);
        }

        .logo-text {
            text-align: center;
        }

        .logo-text h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            margin-bottom: 2px;
        }

        .logo-text p {
            font-size: 0.85rem;
            color: var(--text-tertiary);
        }

        .login-title {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .login-title h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            color: white;
        }

        .login-title p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
        }

        .form-input {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
            background: rgba(30, 20, 50, 0.6);
        }

        .submit-btn {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: var(--spacing-lg);
            box-shadow: 0 10px 25px rgba(26, 86, 219, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(26, 86, 219, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error-color);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            margin-bottom: var(--spacing-lg);
            display: none;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .error-message.show {
            display: flex;
        }

        .footer {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: var(--primary-color);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: var(--spacing-md);
            }

            .login-card {
                padding: var(--spacing-lg);
            }

            .login-title h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-container">
                <div class="logo-info">
                    <div class="logo">N</div>
                    <div class="logo-text">
                        <h2>Nexus Service</h2>
                        <p>Lead Scoring IA</p>
                    </div>
                </div>
            </div>

            <!-- Title -->
            <div class="login-title">
                <h1>Bem-vindo de volta</h1>
                <p>Acesse sua conta para gerenciar leads</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message">
                <span>❌</span>
                <span id="errorText"></span>
            </div>

            <!-- Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="seu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Senha</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="••••••"
                        required
                    >
                </div>

                <button type="submit" class="submit-btn">Entrar na Conta</button>
            </form>

            <!-- Footer -->
            <div class="footer">
                Não tem conta? <a href="/signup">Solicite acesso grátis</a>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('errorMessage');
        const errorTextEl = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = form.querySelector('button[type="submit"]');

            // Clear error
            errorEl.classList.remove('show');

            // Validate
            if (!email || !password) {
                showError('Email e senha são obrigatórios');
                return;
            }

            if (!NexusUtils.isValidEmail(email)) {
                showError('Email inválido');
                return;
            }

            if (password.length < 6) {
                showError('Senha deve ter pelo menos 6 caracteres');
                return;
            }

            // Submit
            btn.disabled = true;
            btn.textContent = 'Entrando...';

            try {
                await login(email, password);
                window.location.href = '/dashboard';
            } catch (err) {
                showError(err.message || 'Erro ao fazer login. Tente novamente.');
                btn.disabled = false;
                btn.textContent = 'Entrar na Conta';
            }
        });

        function showError(message) {
            errorTextEl.textContent = message;
            errorEl.classList.add('show');
            NexusUtils.toastError(message);
        }
    </script>
</body>
</html>
