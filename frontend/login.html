<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Service - Login</title>
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: var(--spacing-lg);
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: var(--spacing-xl);
        }

        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 10px 25px rgba(26, 86, 219, 0.3);
        }

        .login-title {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        .login-title h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-title p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .login-title .subtitle {
            font-size: 0.85rem;
            color: var(--text-tertiary);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: var(--spacing-md);
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: var(--spacing-md);
            background: linear-gradient(135deg, var(--primary-color), #1e3a8a);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: var(--spacing-lg);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(26, 86, 219, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error-color);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            margin-bottom: var(--spacing-lg);
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .footer {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: var(--accent-color);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: var(--spacing-md);
            }

            .login-card {
                padding: var(--spacing-lg);
            }

            .login-title h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-container">
                <div class="logo">N</div>
            </div>

            <!-- Title -->
            <div class="login-title">
                <h1>Nexus Service</h1>
                <p>Lead Scoring em Tempo Real</p>
                <p class="subtitle">Qualifique leads automaticamente com IA</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message"></div>

            <!-- Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="seu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Senha</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="••••••"
                        required
                    >
                </div>

                <button type="submit" class="submit-btn">Entrar</button>
            </form>

            <!-- Footer -->
            <div class="footer">
                Não tem conta? <a href="/signup">Solicite acesso</a>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = form.querySelector('button[type="submit"]');

            // Clear error
            errorEl.classList.remove('show');

            // Validate
            if (!email || !password) {
                showError('Email e senha são obrigatórios');
                return;
            }

            if (!NexusUtils.isValidEmail(email)) {
                showError('Email inválido');
                return;
            }

            if (password.length < 4) {
                showError('Senha deve ter pelo menos 4 caracteres');
                return;
            }

            // Submit
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                await login(email, password);
                window.location.href = '/dashboard';
            } catch (err) {
                showError(err.message || 'Erro ao fazer login. Tente novamente.');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        function showError(message) {
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }
    </script>
</body>
</html>
