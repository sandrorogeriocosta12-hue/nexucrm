<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexus CRM Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 w-full max-w-md mx-4">
            <h2 class="text-2xl font-bold mb-6 text-center">Vexus CRM</h2>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Email</label>
                    <input type="email" id="loginEmail" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Senha</label>
                    <input type="password" id="loginPassword" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition-colors">
                    Entrar
                </button>
            </form>
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="hidden min-h-screen bg-gray-50">

        <!-- Header -->
        <header class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center">
                        <h1 class="text-xl font-semibold text-gray-900">Vexus CRM</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="userEmail" class="text-sm text-gray-600"></span>
                        <button id="logoutBtn" class="text-gray-500 hover:text-gray-700">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="p-2 bg-blue-100 rounded-lg">
                            <i data-lucide="users" class="w-6 h-6 text-blue-600"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Total Leads</p>
                            <p id="totalLeads" class="text-2xl font-bold text-gray-900">0</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="p-2 bg-green-100 rounded-lg">
                            <i data-lucide="target" class="w-6 h-6 text-green-600"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Campanhas</p>
                            <p id="totalCampaigns" class="text-2xl font-bold text-gray-900">0</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="p-2 bg-yellow-100 rounded-lg">
                            <i data-lucide="trending-up" class="w-6 h-6 text-yellow-600"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Conversão</p>
                            <p class="text-2xl font-bold text-gray-900">0%</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="p-2 bg-purple-100 rounded-lg">
                            <i data-lucide="dollar-sign" class="w-6 h-6 text-purple-600"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Receita</p>
                            <p class="text-2xl font-bold text-gray-900">R$ 0</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="mb-6">
                <nav class="flex space-x-8">
                    <button id="leadsTab" class="tab-btn border-b-2 border-blue-500 text-blue-600 px-1 py-2 font-medium">
                        Leads
                    </button>
                    <button id="campaignsTab" class="tab-btn border-b-2 border-transparent text-gray-500 hover:text-gray-700 px-1 py-2 font-medium">
                        Campanhas
                    </button>
                </nav>
            </div>

            <!-- Leads Section -->
            <div id="leadsSection" class="tab-content">
                <div class="bg-white rounded-lg shadow">
                    <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                        <h3 class="text-lg font-medium text-gray-900">Leads</h3>
                        <button id="addLeadBtn" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition-colors">
                            <i data-lucide="plus" class="w-4 h-4 inline mr-2"></i>
                            Novo Lead
                        </button>
                    </div>
                    <div class="p-6">
                        <div id="leadsList" class="space-y-4">
                            <!-- Leads will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Campaigns Section -->
            <div id="campaignsSection" class="tab-content hidden">
                <div class="bg-white rounded-lg shadow">
                    <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                        <h3 class="text-lg font-medium text-gray-900">Campanhas</h3>
                        <button id="addCampaignBtn" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 transition-colors">
                            <i data-lucide="plus" class="w-4 h-4 inline mr-2"></i>
                            Nova Campanha
                        </button>
                    </div>
                    <div class="p-6">
                        <div id="campaignsList" class="space-y-4">
                            <!-- Campaigns will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Add Lead Modal -->
    <div id="addLeadModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-8 w-full max-w-md mx-4">
            <h3 class="text-lg font-medium mb-4">Novo Lead</h3>
            <form id="addLeadForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Nome</label>
                    <input type="text" id="leadName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Email</label>
                    <input type="email" id="leadEmail" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Telefone</label>
                    <input type="tel" id="leadPhone" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Empresa</label>
                    <input type="text" id="leadCompany" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex space-x-4">
                    <button type="button" id="cancelLeadBtn" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-md hover:bg-gray-400 transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition-colors">
                        Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Campaign Modal -->
    <div id="addCampaignModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-8 w-full max-w-md mx-4">
            <h3 class="text-lg font-medium mb-4">Nova Campanha</h3>
            <form id="addCampaignForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Nome</label>
                    <input type="text" id="campaignName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Descrição</label>
                    <textarea id="campaignDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Orçamento</label>
                    <input type="number" id="campaignBudget" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div class="flex space-x-4">
                    <button type="button" id="cancelCampaignBtn" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-md hover:bg-gray-400 transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" class="flex-1 bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition-colors">
                        Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = window.location.origin;
        let authToken = localStorage.getItem('vexus_token');

        // DOM Elements
        const loginModal = document.getElementById('loginModal');
        const dashboard = document.getElementById('dashboard');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const userEmail = document.getElementById('userEmail');
        const logoutBtn = document.getElementById('logoutBtn');

        // Tabs
        const leadsTab = document.getElementById('leadsTab');
        const campaignsTab = document.getElementById('campaignsTab');
        const leadsSection = document.getElementById('leadsSection');
        const campaignsSection = document.getElementById('campaignsSection');

        // Modals
        const addLeadModal = document.getElementById('addLeadModal');
        const addCampaignModal = document.getElementById('addCampaignModal');
        const addLeadBtn = document.getElementById('addLeadBtn');
        const addCampaignBtn = document.getElementById('addCampaignBtn');

        // Initialize Lucide icons
        lucide.createIcons();

        // Check authentication on load
        if (authToken) {
            showDashboard();
            loadDashboardData();
        } else {
            showLogin();
        }

        // Authentication functions
        async function login(email, password) {
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: email,
                        password: password
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    authToken = data.access_token;
                    localStorage.setItem('vexus_token', authToken);
                    localStorage.setItem('user_email', email);
                    showDashboard();
                    loadDashboardData();
                } else {
                    throw new Error('Credenciais inválidas');
                }
            } catch (error) {
                throw error;
            }
        }

        function logout() {
            authToken = null;
            localStorage.removeItem('vexus_token');
            localStorage.removeItem('user_email');
            showLogin();
        }

        // UI functions
        function showLogin() {
            loginModal.classList.remove('hidden');
            dashboard.classList.add('hidden');
        }

        function showDashboard() {
            loginModal.classList.add('hidden');
            dashboard.classList.remove('hidden');
            userEmail.textContent = localStorage.getItem('user_email') || '';
        }

        // API helper
        async function apiRequest(endpoint, options = {}) {
            const defaultOptions = {
                headers: {
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json',
                },
            };

            return fetch(`${API_BASE}${endpoint}`, { ...defaultOptions, ...options });
        }

        // Load dashboard data
        async function loadDashboardData() {
            try {
                // Load leads
                const leadsResponse = await apiRequest('/api/leads/');
                if (leadsResponse.ok) {
                    const leads = await leadsResponse.json();
                    displayLeads(leads);
                    document.getElementById('totalLeads').textContent = leads.length;
                }

                // Load campaigns
                const campaignsResponse = await apiRequest('/api/campaigns/');
                if (campaignsResponse.ok) {
                    const campaigns = await campaignsResponse.json();
                    displayCampaigns(campaigns);
                    document.getElementById('totalCampaigns').textContent = campaigns.length;
                }
            } catch (error) {
                console.error('Error loading dashboard data:', error);
            }
        }

        // Display functions
        function displayLeads(leads) {
            const leadsList = document.getElementById('leadsList');
            leadsList.innerHTML = '';

            if (leads.length === 0) {
                leadsList.innerHTML = '<p class="text-gray-500 text-center py-8">Nenhum lead encontrado</p>';
                return;
            }

            leads.forEach(lead => {
                const leadElement = document.createElement('div');
                leadElement.className = 'flex items-center justify-between p-4 border border-gray-200 rounded-lg';
                leadElement.innerHTML = `
                    <div>
                        <h4 class="font-medium text-gray-900">${lead.name}</h4>
                        <p class="text-sm text-gray-600">${lead.email}</p>
                        <p class="text-sm text-gray-500">${lead.company || 'Sem empresa'}</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="px-2 py-1 text-xs rounded-full ${getStatusColor(lead.status)}">
                            ${lead.status}
                        </span>
                        <span class="text-sm text-gray-500">${lead.phase}</span>
                    </div>
                `;
                leadsList.appendChild(leadElement);
            });
        }

        function displayCampaigns(campaigns) {
            const campaignsList = document.getElementById('campaignsList');
            campaignsList.innerHTML = '';

            if (campaigns.length === 0) {
                campaignsList.innerHTML = '<p class="text-gray-500 text-center py-8">Nenhuma campanha encontrada</p>';
                return;
            }

            campaigns.forEach(campaign => {
                const campaignElement = document.createElement('div');
                campaignElement.className = 'flex items-center justify-between p-4 border border-gray-200 rounded-lg';
                campaignElement.innerHTML = `
                    <div>
                        <h4 class="font-medium text-gray-900">${campaign.name}</h4>
                        <p class="text-sm text-gray-600">${campaign.description || 'Sem descrição'}</p>
                        <p class="text-sm text-gray-500">Orçamento: R$ ${campaign.budget || 0}</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="px-2 py-1 text-xs rounded-full ${getCampaignStatusColor(campaign.status)}">
                            ${campaign.status}
                        </span>
                    </div>
                `;
                campaignsList.appendChild(campaignElement);
            });
        }

        function getStatusColor(status) {
            const colors = {
                'new': 'bg-blue-100 text-blue-800',
                'contacted': 'bg-yellow-100 text-yellow-800',
                'qualified': 'bg-green-100 text-green-800',
                'lost': 'bg-red-100 text-red-800'
            };
            return colors[status] || 'bg-gray-100 text-gray-800';
        }

        function getCampaignStatusColor(status) {
            const colors = {
                'draft': 'bg-gray-100 text-gray-800',
                'active': 'bg-green-100 text-green-800',
                'paused': 'bg-yellow-100 text-yellow-800',
                'completed': 'bg-blue-100 text-blue-800'
            };
            return colors[status] || 'bg-gray-100 text-gray-800';
        }

        // Event listeners
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                await login(email, password);
            } catch (error) {
                loginError.textContent = error.message;
                loginError.classList.remove('hidden');
            }
        });

        logoutBtn.addEventListener('click', logout);

        // Tab switching
        leadsTab.addEventListener('click', () => {
            leadsTab.className = 'tab-btn border-b-2 border-blue-500 text-blue-600 px-1 py-2 font-medium';
            campaignsTab.className = 'tab-btn border-b-2 border-transparent text-gray-500 hover:text-gray-700 px-1 py-2 font-medium';
            leadsSection.classList.remove('hidden');
            campaignsSection.classList.add('hidden');
        });

        campaignsTab.addEventListener('click', () => {
            campaignsTab.className = 'tab-btn border-b-2 border-green-500 text-green-600 px-1 py-2 font-medium';
            leadsTab.className = 'tab-btn border-b-2 border-transparent text-gray-500 hover:text-gray-700 px-1 py-2 font-medium';
            campaignsSection.classList.remove('hidden');
            leadsSection.classList.add('hidden');
        });

        // Add lead modal
        addLeadBtn.addEventListener('click', () => {
            addLeadModal.classList.remove('hidden');
        });

        document.getElementById('cancelLeadBtn').addEventListener('click', () => {
            addLeadModal.classList.add('hidden');
        });

        document.getElementById('addLeadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const leadData = {
                name: document.getElementById('leadName').value,
                email: document.getElementById('leadEmail').value,
                phone: document.getElementById('leadPhone').value,
                company: document.getElementById('leadCompany').value,
                status: 'new',
                source: 'dashboard'
            };

            try {
                const response = await apiRequest('/api/leads/', {
                    method: 'POST',
                    body: JSON.stringify(leadData)
                });

                if (response.ok) {
                    addLeadModal.classList.add('hidden');
                    document.getElementById('addLeadForm').reset();
                    loadDashboardData();
                } else {
                    throw new Error('Erro ao criar lead');
                }
            } catch (error) {
                alert('Erro ao criar lead: ' + error.message);
            }
        });

        // Add campaign modal
        addCampaignBtn.addEventListener('click', () => {
            addCampaignModal.classList.remove('hidden');
        });

        document.getElementById('cancelCampaignBtn').addEventListener('click', () => {
            addCampaignModal.classList.add('hidden');
        });

        document.getElementById('addCampaignForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const campaignData = {
                name: document.getElementById('campaignName').value,
                description: document.getElementById('campaignDescription').value,
                budget: parseFloat(document.getElementById('campaignBudget').value) || null
            };

            try {
                const response = await apiRequest('/api/campaigns/', {
                    method: 'POST',
                    body: JSON.stringify(campaignData)
                });

                if (response.ok) {
                    addCampaignModal.classList.add('hidden');
                    document.getElementById('addCampaignForm').reset();
                    loadDashboardData();
                } else {
                    throw new Error('Erro ao criar campanha');
                }
            } catch (error) {
                alert('Erro ao criar campanha: ' + error.message);
            }
        });
    </script>

</body>
</html>
