<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automações - Vexus CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; }
        .sidebar {
            width: 256px;
            background-color: #4338ca;
            color: white;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }
        .sidebar a { 
            display: block; 
            padding: 0.75rem; 
            border-radius: 0.375rem; 
            margin-bottom: 0.5rem;
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover { background-color: rgba(255,255,255,0.1); }
        .header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div style="font-weight: bold; margin-bottom: 1.5rem; font-size: 1.25rem;">📊 Vexus CRM</div>
            <a href="/dashboard.html">🏠 Dashboard</a>
            <a href="/contacts.html">👥 Contatos</a>
            <a href="/pipeline.html">📊 Pipeline</a>
            <a href="/tasks.html">✅ Tarefas</a>
            <a href="/automations.html" style="background-color: rgba(255,255,255,0.2);">⚙️ Automações</a>
            <a href="/reports.html">📈 Relatórios</a>
            <a href="/settings.html">⚙️ Configurações</a>
            <div style="flex: 1;"></div>
            <button onclick="logout()" style="padding: 0.75rem; background-color: rgba(255,255,255,0.1); border: none; color: white; border-radius: 0.375rem; cursor: pointer;">🚪 Sair</button>
        </nav>

        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <div class="header">
                <h1 style="font-size: 1.875rem; font-weight: 600; color: #1f2937;">Automações</h1>
                <button onclick="openAutomationModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700 transition font-medium">+ Nova Automação</button>
            </div>

            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto p-6">
                <div class="bg-white rounded-lg shadow">
                    <div class="p-4 border-b bg-blue-50">
                        <p class="text-sm text-blue-700">💡 Crie regras para automatizar tarefas, enviar e-mails e criar lembretes automaticamente.</p>
                    </div>
                    <div id="automations-list" class="p-4 space-y-3">
                        <p class="text-gray-500 text-sm">Nenhuma automação. <a href="#" onclick="openAutomationModal(); return false" class="text-indigo-600">Criar uma agora</a></p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal de nova automação -->
    <div id="automationModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-2xl p-6">
            <h3 class="text-lg font-semibold mb-4">Nova Automação</h3>
            <form id="automationForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome da automação *</label>
                    <input type="text" id="autoName" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Gatilho</label>
                        <select id="autoTrigger" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="lead.created">Lead criado</option>
                            <option value="deal.stage_changed">Negócio movido de estágio</option>
                            <option value="task.overdue">Tarefa vencida</option>
                            <option value="contact.inactive">Contato inativo (X dias)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ação</label>
                        <select id="autoAction" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="email.send">Enviar e-mail</option>
                            <option value="task.create">Criar tarefa</option>
                            <option value="notification.send">Notificar usuário</option>
                            <option value="field.update">Atualizar campo</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end space-x-2 pt-4 border-t">
                    <button type="button" onclick="closeAutomationModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50 transition">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Criar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let automations = JSON.parse(localStorage.getItem('automations')) || [
            { id: 1, name: 'E-mail ao novo lead', trigger: 'lead.created', action: 'email.send', active: true },
            { id: 2, name: 'Tarefa ao mover negócio', trigger: 'deal.stage_changed', action: 'task.create', active: true }
        ];

        async function checkAuthPage() {
            await checkAuth();
        }

        // logout() disponível em auth.js


        function openAutomationModal() {
            document.getElementById('automationModal').classList.remove('hidden');
        }

        function closeAutomationModal() {
            document.getElementById('automationModal').classList.add('hidden');
            document.getElementById('automationForm').reset();
        }

        function saveAutomations() {
            localStorage.setItem('automations', JSON.stringify(automations));
        }

        function renderAutomations() {
            const list = document.getElementById('automations-list');
            if (automations.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-sm">Nenhuma automação. <a href="#" onclick="openAutomationModal(); return false" class="text-indigo-600">Criar uma agora</a></p>';
                return;
            }
            list.innerHTML = automations.map(a => `
                <div style="border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h4 style="font-weight: 500; color: #111827;">${a.name}</h4>
                        <p style="font-size: 0.875rem; color: #6b7280; margin-top: 0.25rem;">Quando: <strong>${a.trigger}</strong> → Ação: <strong>${a.action}</strong></p>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <span style="padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; ${a.active ? 'background-color: #dcfce7; color: #166534;' : 'background-color: #f3f4f6; color: #374151;'}">
                            ${a.active ? '✅ Ativa' : '⏸ Inativa'}
                        </span>
                        <button onclick="deleteAutomation(${a.id})" style="color: #ef4444; cursor: pointer; border: none; background: none; font-size: 1rem;">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteAutomation(id) {
            if (confirm('Deletar esta automação?')) {
                automations = automations.filter(a => a.id !== id);
                saveAutomations();
                renderAutomations();
            }
        }

        document.getElementById('automationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newAuto = {
                id: Math.max(...automations.map(a => a.id), 0) + 1,
                name: document.getElementById('autoName').value,
                trigger: document.getElementById('autoTrigger').value,
                action: document.getElementById('autoAction').value,
                active: true
            };
            automations.push(newAuto);
            saveAutomations();
            closeAutomationModal();
            renderAutomations();
        });

        checkAuth();
        renderAutomations();
    </script>
</body>
</html>
