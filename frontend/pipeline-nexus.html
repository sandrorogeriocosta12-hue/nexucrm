<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Service - Pipeline Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; }
        
        .gradient-text {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .kanban-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            padding: 24px;
            overflow-x: auto;
        }
        
        .kanban-column {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.5));
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 16px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }
        
        .kanban-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(168, 85, 247, 0.3);
        }
        
        .kanban-title {
            font-size: 1rem;
            font-weight: 700;
            color: #f1f5f9;
        }
        
        .kanban-count {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        
        .kanban-cards {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .card {
            background: linear-gradient(135deg, rgba(71, 85, 105, 0.3), rgba(51, 65, 85, 0.3));
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 12px;
            cursor: grab;
            transition: all 0.2s;
        }
        
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 8px 16px rgba(168, 85, 247, 0.1);
        }
        
        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #e2e8f0;
        }
        
        .card-score {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 8px;
            text-transform: uppercase;
        }
        
        .score-hot { background-color: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .score-warm { background-color: rgba(251, 146, 60, 0.2); color: #fdba74; }
        .score-cold { background-color: rgba(59, 130, 246, 0.2); color: #93c5fd; }
        
        .card-contact {
            font-size: 12px;
            color: #cbd5e1;
        }
        
        .sidebar-mini {
            width: 80px;
            background: linear-gradient(180deg, #0f172a, #1e293b);
            border-right: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .nav-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 20px;
        }
        
        .nav-icon.active {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
        }
        
        .nav-label {
            display: none;
            color: #94a3b8;
            text-align: center;
            transition: all 0.2s;
        }
        
        .nav-icon:hover .nav-label {
            display: block;
            color: #cbd5e1;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-950 text-gray-100 pipeline-page">

<div class="flex h-screen overflow-hidden">
    
    <!-- SIDEBAR MINI -->
    <aside class="sidebar-mini flex flex-col items-center py-8 px-4 space-y-4">
        <!-- navigation links -->
        <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-pink-600 rounded-lg flex items-center justify-center font-bold text-white">N</div>
        <nav class="flex flex-col gap-4 flex-1">
            <a href="inbox-nexus.html" class="nav-icon flex flex-col items-center" title="Inbox">💬<span class="nav-label text-xs mt-1">Inbox</span></a>
            <a href="pipeline-nexus.html" class="nav-icon active flex flex-col items-center" title="Pipeline">📊<span class="nav-label text-xs mt-1">Pipeline</span></a>
            <a href="#" class="nav-icon flex flex-col items-center" title="Agentes">🤖<span class="nav-label text-xs mt-1">Agentes</span></a>
            <a href="#" class="nav-icon flex flex-col items-center" title="Contatos">👥<span class="nav-label text-xs mt-1">Contatos</span></a>
            <a href="#" class="nav-icon flex flex-col items-center" title="Analytics">📈<span class="nav-label text-xs mt-1">Analytics</span></a>
        </nav>
        </nav>
        <button onclick="logout()" class="mt-4 nav-icon flex flex-col items-center" title="Sair">🚪<span class="nav-label text-xs mt-1">Sair</span></button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-hidden flex flex-col">
        
        <!-- HEADER -->
        <div class="p-6 border-b border-slate-700 bg-slate-800/50">
            <h1 class="text-3xl font-bold">
                <span class="gradient-text">Pipeline Nexus Service</span>
            </h1>
            <p class="text-gray-400 text-sm mt-1">Funil de vendas em tempo real com 103 leads ativos</p>
        </div>

        <!-- KANBAN BOARD -->
        <div class="flex-1 overflow-x-auto">
            <div id="kanban-board" class="kanban-container" style="min-width: max-content;">
                <div class="w-full text-center text-slate-400 py-24">
                    Carregando funis e oportunidades...
                </div>
            </div>
        </div>

        <!-- MODAL DE NEGÓCIO -->
        <div id="deal-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-slate-950/90 p-4">
            <div class="w-full max-w-2xl rounded-3xl border border-slate-700 bg-slate-900 p-6 shadow-2xl">
                <div class="flex items-start justify-between gap-4 mb-6">
                    <div>
                        <h2 id="deal-modal-title" class="text-2xl font-bold text-white"></h2>
                        <p id="deal-modal-contact" class="text-sm text-slate-400 mt-1"></p>
                    </div>
                    <button id="deal-modal-close" class="rounded-full border border-slate-700 px-4 py-2 text-slate-200 hover:bg-slate-800">Fechar</button>
                </div>
                <div class="grid grid-cols-2 gap-4 text-sm text-slate-300 mb-6">
                    <div><strong>Fase:</strong> <span id="deal-modal-stage"></span></div>
                    <div><strong>Valor:</strong> <span id="deal-modal-value"></span></div>
                    <div><strong>Probabilidade:</strong> <span id="deal-modal-probability"></span></div>
                    <div><strong>Atualizado:</strong> <span id="deal-modal-updated"></span></div>
                </div>
                <div class="prose prose-invert text-slate-200">
                    <p id="deal-modal-notes"></p>
                </div>
            </div>
        </div>

    </main>

</div>

    <!-- core scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="js/pipeline.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
