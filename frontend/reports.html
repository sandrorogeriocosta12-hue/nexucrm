<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Nexus CRM</title>
    <link rel="stylesheet" href="css/design-system.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        .sidebar {
            width: 256px;
            background: linear-gradient(135deg, #1A56DB 0%, #4338CA 100%);
            color: white;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .sidebar-link {
            display: block;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: white;
            text-decoration: none;
            transition: background-color 0.2s;
            margin-bottom: 0.5rem;
        }
        
        .sidebar-link:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }
        
        .sidebar-link.active {
            background-color: rgba(255, 255, 255, 0.25);
        }
        
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            text-align: center;
            transition: all 0.2s;
        }
        
        .stat-card:hover {
            border-color: var(--accent-color);
            box-shadow: var(--shadow-lg);
        }
        
        .stat-value {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div style="display: flex; height: 100vh;">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div style="font-weight: bold; margin-bottom: 1.5rem; font-size: 1.25rem;">📊 Nexus CRM</div>
            <a href="/dashboard.html" class="sidebar-link">🏠 Dashboard</a>
            <a href="/contacts.html" class="sidebar-link">👥 Contatos</a>
            <a href="/pipeline.html" class="sidebar-link">📊 Pipeline</a>
            <a href="/tasks.html" class="sidebar-link">✅ Tarefas</a>
            <a href="/reports.html" class="sidebar-link active">📈 Relatórios</a>
            <a href="/settings.html" class="sidebar-link">⚙️ Configurações</a>
            <div style="flex: 1;"></div>
            <button onclick="logout()" style="padding: 0.75rem; background-color: rgba(255,255,255,0.1); border: none; color: white; border-radius: 0.375rem; cursor: pointer; font-weight: 600;">🚪 Sair</button>
        </nav>

        <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <!-- Header -->
            <div class="header">
                <h1 style="font-size: 1.875rem; font-weight: 600; color: var(--text-primary);">Relatórios e Análises</h1>
                <select id="periodSelect" style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-primary); padding: 0.5rem 0.75rem; font-size: 0.875rem;">
                    <option value="month">Este mês</option>
                    <option value="last_month">Mês passado</option>
                    <option value="year">Este ano</option>
                </select>
            </div>

            <!-- Main Content -->
            <main style="flex: 1; overflow-y: auto; padding: 1.5rem;">
                <!-- KPIs -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="stat-card">
                        <div class="stat-value">R$ 156.500</div>
                        <div class="stat-label">Receita este mês</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">42</div>
                        <div class="stat-label">Novos leads</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">18</div>
                        <div class="stat-label">Negócios fechados</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">28.5%</div>
                        <div class="stat-label">Taxa de conversão</div>
                    </div>
                </div>

                <!-- Charts -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem;">
                    <!-- Receita por Estágio -->
                    <div class="card">
                        <h3 style="font-weight: 600; margin-bottom: 1rem;">Receita por Estágio</h3>
                        <div id="stageChart" class="chart-container" style="height: 300px; position: relative;">
                            <canvas></canvas>
                        </div>
                    </div>

                    <!-- Origem de Leads -->
                    <div class="card">
                        <h3 style="font-weight: 600; margin-bottom: 1rem;">Origem de Leads</h3>
                        <div id="sourceChart" class="chart-container" style="height: 300px; position: relative;">
                            <canvas></canvas>
                        </div>
                    </div>
                </div>

                <!-- Bottom Charts -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem;">
                    <!-- Tendência Mensal -->
                    <div class="card">
                        <h3 style="font-weight: 600; margin-bottom: 1rem;">Tendência de Receita (últimos 12 meses)</h3>
                        <div id="trendChart" class="chart-container" style="height: 300px; position: relative;">
                            <canvas></canvas>
                        </div>
                    </div>

                    <!-- Performance da Equipe -->
                    <div class="card">
                        <h3 style="font-weight: 600; margin-bottom: 1rem;">Top Vendedores</h3>
                        <div id="teamChart" class="chart-container" style="height: 300px; position: relative;">
                            <canvas></canvas>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Dados de exemplo para gráficos
        const stageData = [
            { label: 'Lead', value: 0 },
            { label: 'Qualificado', value: 32500 },
            { label: 'Proposta', value: 65000 },
            { label: 'Fechado', value: 59000 }
        ];

        const sourceData = [
            { label: 'Website', value: 35 },
            { label: 'LinkedIn', value: 28 },
            { label: 'Indicação', value: 22 },
            { label: 'Evento', value: 10 },
            { label: 'Outro', value: 5 }
        ];

        const trendData = [
            { date: 'Jan', value: 45000 },
            { date: 'Fev', value: 52000 },
            { date: 'Mar', value: 68000 },
            { date: 'Abr', value: 61000 },
            { date: 'Mai', value: 75000 },
            { date: 'Jun', value: 82000 },
            { date: 'Jul', value: 71000 },
            { date: 'Ago', value: 85000 },
            { date: 'Set', value: 79000 },
            { date: 'Out', value: 92000 },
            { date: 'Nov', value: 87000 },
            { date: 'Dez', value: 98000 }
        ];

        const teamData = [
            { label: 'Victor Emanuel', value: 45000 },
            { label: 'Ana Silva', value: 38000 },
            { label: 'Carlos Mendes', value: 32000 },
            { label: 'Beatriz Costa', value: 28000 }
        ];

        // Renderizar gráficos
        function renderCharts() {
            // Gráfico de Receita por Estágio (Bar)
            NexusUtils.renderBarChart('stageChart', stageData, {
                label: 'Receita (R$)',
                backgroundColor: '#6366f1'
            });

            // Gráfico de Origem de Leads (Pie)
            NexusUtils.renderPieChart('sourceChart', sourceData, {
                label: 'Origem'
            });

            // Gráfico de Tendência (Area)
            NexusUtils.renderAreaChart('trendChart', trendData, {
                label: 'Receita (R$)',
                borderColor: '#06b6d4',
                backgroundColor: 'rgba(6, 182, 212, 0.1)'
            });

            // Gráfico de Performance (Bar)
            NexusUtils.renderBarChart('teamChart', teamData, {
                label: 'Receita (R$)',
                backgroundColor: '#8b5cf6'
            });
        }

        async function initPage() {
            await checkAuth();
            setTimeout(() => {
                renderCharts();
                NexusUtils.toastSuccess('Relatórios carregados com sucesso!', 3000);
            }, 100);
        }

        // Escutar mudanças no período
        document.getElementById('periodSelect')?.addEventListener('change', (e) => {
            const period = e.target.value;
            console.log('Período selecionado:', period);
            // Aqui você poderia fazer uma requisição para carregar dados do período
            NexusUtils.toastInfo(`Carregando dados de ${period}...`, 3000);
            setTimeout(() => renderCharts(), 500);
        });

        initPage();
    </script>
</body>
</html>
