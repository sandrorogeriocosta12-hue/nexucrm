<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline - Nexus CRM</title>
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        .kanban-board {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            padding-bottom: 1rem;
        }
        
        .kanban-column {
            flex: 0 0 320px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .kanban-column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-color);
        }
        
        .kanban-column-count {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--accent-color);
            color: white;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .kanban-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            margin-bottom: 0.75rem;
            cursor: grab;
            transition: all 0.2s;
            border-left: 4px solid var(--primary-color);
        }
        
        .kanban-card:hover {
            border-color: var(--accent-color);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        .kanban-card-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .kanban-card-contact {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .kanban-card-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .sidebar {
            width: 256px;
            background: linear-gradient(135deg, #1A56DB 0%, #4338CA 100%);
            color: white;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .sidebar-title {
            font-weight: bold;
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
        }
        
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .sidebar-link {
            display: block;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: white;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        
        .sidebar-link:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }
        
        .sidebar-link.active {
            background-color: rgba(255, 255, 255, 0.25);
        }
        
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title {
            font-size: 1.875rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #155BD3;
            box-shadow: var(--shadow-lg);
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
            padding: var(--spacing-lg);
        }
    </style>
</head>
<body>
    <div style="display: flex; height: 100vh;">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-title">📊 Nexus CRM</div>
            <div class="sidebar-nav">
                <a href="/dashboard.html" class="sidebar-link">🏠 Dashboard</a>
                <a href="/contacts.html" class="sidebar-link">👥 Contatos</a>
                <a href="/pipeline.html" class="sidebar-link active">📊 Pipeline</a>
                <a href="/tasks.html" class="sidebar-link">✅ Tarefas</a>
                <a href="/reports.html" class="sidebar-link">📈 Relatórios</a>
                <a href="/settings.html" class="sidebar-link">⚙️ Configurações</a>
            </div>
            <div style="flex: 1;"></div>
            <button onclick="logout()" style="padding: 0.75rem; background-color: rgba(255,255,255,0.1); border: none; color: white; border-radius: 0.375rem; cursor: pointer; font-weight: 600;">🚪 Sair</button>
        </nav>

        <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <!-- Header -->
            <div class="header">
                <h1 class="header-title">Pipeline de Vendas</h1>
                <button onclick="openDealModal()" class="btn-primary">+ Novo Negócio</button>
            </div>
            
            <main style="flex: 1; overflow-x: auto; padding: 1.5rem;">
                <div id="kanban" class="kanban-board"></div>
            </main>
        </div>
    </div>

    <!-- Modal de novo negócio -->
    <div id="dealModal" class="modal">
        <div class="modal-content">
            <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-primary);">Novo Negócio</h3>
            <form id="dealForm" style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem;">Título *</label>
                    <input type="text" id="dealTitle" required style="width: 100%; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 0.5rem 0.75rem; background: var(--bg-primary); color: var(--text-primary);">
                </div>
                <div>
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem;">Valor (R$)</label>
                    <input type="number" id="dealValue" style="width: 100%; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 0.5rem 0.75rem; background: var(--bg-primary); color: var(--text-primary);">
                </div>
                <div>
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem;">Contato</label>
                    <input type="text" id="dealContact" placeholder="Nome do contato" style="width: 100%; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 0.5rem 0.75rem; background: var(--bg-primary); color: var(--text-primary);">
                </div>
                <div style="display: flex; gap: 0.75rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                    <button type="button" onclick="closeDealModal()" style="padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: transparent; color: var(--text-primary); cursor: pointer;">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>
        const stages = [
            { id: 1, name: 'Lead', color: '#64748B' },
            { id: 2, name: 'Qualificado', color: '#3B82F6' },
            { id: 3, name: 'Proposta', color: '#8B5CF6' },
            { id: 4, name: 'Negociação', color: '#F59E0B' },
            { id: 5, name: 'Fechado', color: '#10B981' }
        ];

        let deals = JSON.parse(localStorage.getItem('deals')) || [
            { id: 1, title: 'Projeto Tech Solutions', contact: 'João Silva', value: 15000, stage: 1 },
            { id: 2, title: 'Consultoria Digital', contact: 'Maria Santos', value: 8500, stage: 2 },
            { id: 3, title: 'Implementação ERP', contact: 'Carlos Mendes', value: 25000, stage: 1 }
        ];

        function openDealModal() {
            document.getElementById('dealModal').classList.add('active');
        }

        function closeDealModal() {
            document.getElementById('dealModal').classList.remove('active');
            document.getElementById('dealForm').reset();
        }

        function saveDeal(e) {
            e.preventDefault();
            const newDeal = {
                id: Math.max(...deals.map(d => d.id), 0) + 1,
                title: document.getElementById('dealTitle').value,
                value: parseFloat(document.getElementById('dealValue').value) || 0,
                contact: document.getElementById('dealContact').value,
                stage: 1
            };
            deals.push(newDeal);
            localStorage.setItem('deals', JSON.stringify(deals));
            closeDealModal();
            renderPipeline();
        }

        function renderPipeline() {
            const kanban = document.getElementById('kanban');
            kanban.innerHTML = '';

            stages.forEach(stage => {
                const column = document.createElement('div');
                column.className = 'kanban-column';
                const stagDeals = deals.filter(d => d.stage === stage.id);
                
                column.innerHTML = `
                    <div class="kanban-column-header">
                        <span style="font-weight: 600; color: var(--text-primary);">${stage.name}</span>
                        <span class="kanban-column-count">${stagDeals.length}</span>
                    </div>
                    <div data-stage-id="${stage.id}">
                        ${stagDeals.map(deal => `
                            <div class="kanban-card">
                                <div class="kanban-card-title">${deal.title}</div>
                                <div class="kanban-card-contact">${deal.contact}</div>
                                <div class="kanban-card-value">R$ ${deal.value.toLocaleString('pt-BR')}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                kanban.appendChild(column);
            });
        }

        document.getElementById('dealForm').addEventListener('submit', saveDeal);
        checkAuth();
        renderPipeline();
    </script>
</body>
</html>
