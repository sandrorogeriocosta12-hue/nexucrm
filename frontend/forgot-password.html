<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Esqueci a Senha - Nexus Service</title>
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: linear-gradient(135deg, #0F172A 0%, #1a1f3a 50%, #0F172A 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Background effect */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(26, 86, 219, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .forgot-page {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            min-height: 100vh;
        }

        .forgot-container {
            width: 100%;
            max-width: 440px;
        }

        .forgot-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1A56DB 0%, #7C3AED 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            box-shadow: 0 8px 32px rgba(26, 86, 219, 0.4);
        }

        .logo-info h2 {
            font-size: 18px;
            font-weight: 700;
            color: white;
            text-align: center;
        }

        .logo-info p {
            font-size: 13px;
            color: #94A3B8;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #E2E8F0;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: #64748B;
        }

        .form-input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #1A56DB 0%, #7C3AED 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(26, 86, 219, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .forgot-footer {
            text-align: center;
            font-size: 14px;
            color: #94A3B8;
        }

        .forgot-footer a {
            color: #60A5FA;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-footer a:hover {
            text-decoration: underline;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            color: #22C55E;
            text-align: center;
            display: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            color: #EF4444;
            text-align: center;
            display: none;
        }

        @media (max-width: 480px) {
            .forgot-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-page">
        <div class="forgot-container">
            <div class="forgot-card">
                <!-- Logo -->
                <div class="logo-container">
                    <div class="logo">N</div>
                    <div class="logo-info">
                        <h2>Nexus Service</h2>
                        <p>Recuperação de Senha</p>
                    </div>
                </div>

                <!-- Success Message -->
                <div id="successMessage" class="success-message">
                    ✅ Email enviado! Verifique sua caixa de entrada e siga as instruções para redefinir sua senha.
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="error-message">
                    ❌ Erro ao enviar email. Verifique se o email está correto.
                </div>

                <!-- Form -->
                <form id="forgotForm">
                    <div class="form-group">
                        <label for="email" class="form-label">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder="Digite seu e-mail"
                            required
                        >
                    </div>

                    <button type="submit" class="submit-btn">Enviar Link de Recuperação</button>
                </form>

                <!-- Footer -->
                <div class="forgot-footer">
                    <a href="/login">← Voltar ao Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('forgotForm');
        const successEl = document.getElementById('successMessage');
        const errorEl = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const submitBtn = form.querySelector('button[type="submit"]');

            if (!email) {
                showError('Por favor, digite seu e-mail');
                return;
            }

            // Simple email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('E-mail inválido');
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    showSuccess();
                    form.reset();
                } else {
                    const data = await response.json();
                    throw new Error(data.detail || 'Erro ao enviar email');
                }
            } catch (error) {
                console.error('Forgot password error:', error);
                showError(error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Link de Recuperação';
            }
        });

        function showSuccess() {
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
        }

        function showError(message) {
            errorEl.textContent = '❌ ' + message;
            errorEl.style.display = 'block';
            successEl.style.display = 'none';
        }
    </script>
</body>
</html>
