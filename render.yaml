services:
  - type: web
    name: nexuscrm
    env: python
    pythonVersion: 3.12
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python app_server.py
    envVars:
      - key: PORT
        value: "8000"
      - key: DEBUG
        value: "False"
      - key: PYDANTIC_SKIP_VALIDATION
        value: "1"
