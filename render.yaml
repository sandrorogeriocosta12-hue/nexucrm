services:
  - type: web
    name: nexuscrm
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app_server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PORT
        value: "8000"
      - key: DEBUG
        value: "False"
