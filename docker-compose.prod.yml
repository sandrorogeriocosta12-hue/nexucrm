version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vexus_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vexus_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vexus_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vexus_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: vexus_backend
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vexus_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: vexus_nginx
    volumes:
      - ./nginx.conf.prod:/etc/nginx/conf.d/default.conf
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./frontend:/usr/share/nginx/html
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - vexus_network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: vexus_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - vexus_network
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    container_name: vexus_backup
    volumes:
      - ./scripts/backup.sh:/backup.sh
      - ./backups:/backups
    env_file:
      - .env.production
    entrypoint: |
      sh -c "
        echo '0 3 * * * /bin/sh /backup.sh' > /etc/crontabs/root
        crond -f
      "
    depends_on:
      - postgres
    networks:
      - vexus_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vexus_network:
    driver: bridge

